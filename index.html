function render() {
  const s=getStats(), now=getNow();
  const dateStr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const cm=getCurrentMinutes();

  // Show/hide FAB
  const fab = document.getElementById('fab');
  if (fab) fab.style.display = ['today','daily','weekly'].includes(state.view) ? 'flex' : 'none';

  document.getElementById('bottomNav').innerHTML = [
    ['today','☀️','Today'],['daily','📋','Daily'],['weekly','📆','Weekly'],
    ['routes','🗺️','Routes'],['timeline','⏱️','Timeline'],['settings','⚙️','Settings']
  ].map(([v,ic,lb])=>`<div class="tab ${state.view===v?'active':''}" onclick="setView('${v}')"><span class="tab-icon">${ic}</span>${lb}</div>`).join('');

  const sidebarHTML = `<div class="sidebar">
    <div class="sidebar-header"><div class="dog-avatar">🐕</div><div><h1>Whiteclaw</h1><p>Care Tracker</p></div></div>
    <div style="margin-bottom:24px">
      ${['today,☀️,Today','daily,📋,Daily Routine','weekly,📆,Weekly / Regular','routes,🗺️,Walking Routes','timeline,⏱️,Timeline','settings,⚙️,Settings'].map(x=>{
        const [v,ic,lb]=x.split(',');
        return `<div class="nav-item ${state.view===v?'active':''}" onclick="setView('${v}')"><span class="icon">${ic}</span>${lb}</div>`;
      }).join('')}
    </div>
    <div class="sidebar-stats">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Today's Progress</div>
      <div class="stat-row"><span class="label">Completed</span><span class="value">${s.done}/${s.total}</span></div>
      <div class="stat-row"><span class="label">Daily</span><span class="value">${s.dd}/${s.td}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%"></div></div>
      ${s.pct===100?'<div class="streak" style="margin-top:10px">🔥 All done!</div>':''}
    </div>
  </div>`;

  Object.keys(routeMapInstances).forEach(k=>{ try{routeMapInstances[k].remove();}catch(e){} delete routeMapInstances[k]; });
  const mainHTML = renderView(s, dateStr, timeStr, cm);
  document.getElementById('app').innerHTML = sidebarHTML + `<div class="main">${mainHTML}</div>`;
  postRenderMaps();
}

function renderView(s, dateStr, timeStr, cm) {
  switch(state.view) {
    case 'today': return viewToday(s,dateStr,timeStr,cm);
    case 'daily': return viewDaily(cm);
    case 'weekly': return viewWeekly();
    case 'timeline': return viewTimeline(cm);
    case 'routes': return viewRoutes();
    case 'settings': return viewSettings();
    default: return viewToday(s,dateStr,timeStr,cm);
  }
}

function notifBanner() {
  if(state.notificationsEnabled && 'Notification' in window && Notification.permission==='granted') return '';
  if(!('Notification' in window)) {
    if (isIOS() && !isPWA()) {
      return `<div class="notif-banner" onclick="showToast('Add this app to your Home Screen first (Share → Add to Home Screen), then enable notifications')">
        <span class="icon">📲</span>
        <div class="text"><strong>Add to Home Screen</strong>Required for notifications on iPhone</div>
        <button class="btn">How</button>
      </div>`;
    }
    return '';
  }
  return `<div class="notif-banner" onclick="requestNotifPermission()">
    <span class="icon">🔔</span>
    <div class="text"><strong>Enable Reminders</strong>Get notified 30 min before tasks & persistent overdue alerts</div>
    <button class="btn">Enable</button>
  </div>`;
}

function viewToday(s, dateStr, timeStr, cm) {
  const daily = getDailyTasks();
  const weekly = getWeeklyTasks();
  const overdue=weekly.filter(t=>isOverdue(t.nextDue)&&!isWeeklyDone(t.id));
  const dueW=weekly.filter(t=>isDueToday(t.nextDue)&&!isWeeklyDone(t.id));
  const past=daily.filter(t=>(t.timeMinutes||0)<=cm), upcoming=daily.filter(t=>(t.timeMinutes||0)>cm);

  return `<div class="main-header">
    <h2>☀️ Today</h2><div class="subtitle">${dateStr} &bull; ${timeStr}</div>
    <div class="streak">🐾 ${s.total-s.done?s.total-s.done+' tasks left':'All done! 🔥'}</div>
  </div>
  ${notifBanner()}
  ${overdue.length?`<div class="section"><div class="section-header"><h3>⚠️ Overdue</h3><span class="count">${overdue.length}</span></div>${overdue.map(weeklyItem).join('')}</div>`:''}
  <div class="section"><div class="section-header"><h3>🐕 Daily Routine</h3><span class="count">${s.dd}/${s.td}</span></div>
    ${past.map(t=>dailyItem(t,cm)).join('')}
    ${upcoming.length&&past.length?`<div class="current-time-bar"><span class="dot"></span>Now — ${timeStr}</div>`:''}
    ${upcoming.map(t=>dailyItem(t,cm)).join('')}
  </div>
  ${dueW.length?`<div class="section"><div class="section-header"><h3>📆 Also Due Today</h3><span class="count">${dueW.length}</span></div>${dueW.map(weeklyItem).join('')}</div>`:''}`;
}

function viewDaily(cm) {
  const daily = getDailyTasks();
  return `<div class="main-header"><h2>📋 Daily Routine</h2><div class="subtitle">Every single day — tap any task to edit</div></div>
  <div class="section">
    ${daily.map(t=>dailyItem(t,cm)).join('')}
    <div class="add-task-btn" onclick="openTaskEditor('new')">+ Add Daily Task</div>
  </div>`;
}

function viewWeekly() {
  const weekly = getWeeklyTasks();
  return `<div class="main-header"><h2>📆 Weekly / Regular</h2><div class="subtitle">Grooming, health & supplies — tap any task to edit</div></div>
  <div class="section">
    ${weekly.map(weeklyItem).join('')}
    <div class="add-task-btn" onclick="state.editingTask='new';const m=document.getElementById('taskModal');setTimeout(()=>{document.getElementById('ed-type').value='weekly';document.getElementById('ed-type').dispatchEvent(new Event('change'));},100);openTaskEditor('new');">+ Add Weekly Task</div>
  </div>`;
}

function viewTimeline(cm) {
  const daily = getDailyTasks();
  const timeStr=getNow().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  let html=`<div class="main-header"><h2>⏱️ Timeline</h2><div class="subtitle">Whiteclaw's day at a glance</div></div><div class="timeline">`;
  let ins=false;
  daily.forEach(t=>{
    if(!ins&&(t.timeMinutes||0)>cm){ html+=`<div class="current-time-bar" style="margin-left:-24px"><span class="dot"></span>Now — ${timeStr}</div>`; ins=true; }
    html+=dailyItem(t,cm);
  });
  if(!ins) html+=`<div class="current-time-bar" style="margin-left:-24px"><span class="dot"></span>Now — ${timeStr}</div>`;
  return html+'</div>';
}

function viewSettings() {
  const notifOn = state.notificationsEnabled && 'Notification' in window && Notification.permission==='granted';
  const notifSupported = 'Notification' in window;
  const home = getHomeLocation();
  const isiOS = isIOS();
  const isPwa = isPWA();

  let notifStatusHTML = '';
  if (isiOS && !isPwa) {
    notifStatusHTML = `<div class="notif-status-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px"><span class="notif-dot inactive"></span>Not Available</div>
      <div style="font-size:12px;color:var(--text-dim)">iOS requires this app to be <strong>added to your Home Screen</strong> before notifications can work. In Safari, tap the Share button → Add to Home Screen.</div>
    </div>`;
  } else if (isiOS && isPwa && !notifOn) {
    notifStatusHTML = `<div class="notif-status-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px"><span class="notif-dot limited"></span>Ready to Enable</div>
      <div style="font-size:12px;color:var(--text-dim)">You're running as a Home Screen app — tap the toggle to enable notifications. Note: iOS delivers notifications only while the app is open or recently backgrounded.</div>
    </div>`;
  } else if (notifOn) {
    notifStatusHTML = `<div class="notif-status-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px"><span class="notif-dot active"></span>Active</div>
      <div style="font-size:12px;color:var(--text-dim)">You'll get alerts 30 min before tasks, at task time, and persistent reminders every 30 min for overdue tasks until completed.${isiOS ? ' On iOS, notifications work best when the app is open or recently backgrounded.' : ''}</div>
    </div>`;
  }

  return `<div class="main-header"><h2>⚙️ Settings</h2><div class="subtitle">Home, notifications & app preferences</div></div>

  <div class="settings-section"><h3>🏠 Home Address</h3>
    <div class="address-current">
      <div class="label" style="font-size:14px;font-weight:600">${home.address}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${home.lat.toFixed(5)}°N, ${Math.abs(home.lon).toFixed(5)}°W</div>
    </div>
    <div style="padding:0 0 6px">
      <input id="address-input" class="address-input" type="text" placeholder="Enter new address (e.g. 123 Main St, City, FL)"
        onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)updateHomeAddress(v);}">
      <button class="btn-primary" onclick="const v=document.getElementById('address-input').value.trim();if(v)updateHomeAddress(v);else showToast('Enter an address first')">Update Home Address</button>
    </div>
  </div>

  <div class="settings-section"><h3>🔔 Notifications</h3>
    ${notifStatusHTML}
    <div class="setting-row">
      <div><div class="label">Task reminders</div><div class="desc">30 min before, at time, then every 30 min if overdue</div></div>
      ${notifSupported?`<div class="toggle ${notifOn?'on':''}" onclick="requestNotifPermission()"></div>`:'<span style="font-size:12px;color:var(--text-muted)">Not supported</span>'}
    </div>
    <div class="setting-row">
      <div><div class="label">How it works</div><div class="desc">Notifications are delivered via the Service Worker for iOS compatibility. Persistent overdue reminders repeat every 30 minutes until you mark the task complete. Completing a task instantly stops all its reminders.</div></div>
    </div>
  </div>

  <div class="settings-section"><h3>🗺️ Route Engine</h3>
    <div class="setting-row" style="flex-direction:column;align-items:stretch">
      <div class="label">How routes are generated</div>
      <div class="desc" style="margin-top:4px">Routes use <strong>OSRM foot routing</strong> powered by OpenStreetMap. 4 loop patterns (circle, lollipop, figure-8, zigzag), scored 0-100 on loop quality, residential %, green spaces & variety.</div>
      <div style="margin-top:8px">
        <div class="walkability-badge">✅ Sidewalks prioritized</div>
        <div class="walkability-badge">✅ Pedestrian paths included</div>
        <div class="walkability-badge">✅ Highways avoided</div>
        <div class="walkability-badge">✅ 7-day anti-repetition</div>
      </div>
    </div>
  </div>

  <div class="settings-section"><h3>📱 Install as App</h3>
    <div class="setting-row">
      <div><div class="label">Add to Home Screen</div><div class="desc">On iOS: tap Share → Add to Home Screen<br>On Android: tap Menu → Install app<br><strong>Required for notifications on iOS</strong></div></div>
      <span style="font-size:18px">📲</span>
    </div>
  </div>

  <div class="settings-section"><h3>🗑️ Data Management</h3>
    <div class="setting-row">
      <div><div class="label">Reset tasks to defaults</div><div class="desc">Removes all custom tasks and restores original task list</div></div>
      <button style="background:var(--red);color:white;border:none;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer" onclick="if(confirm('Reset all tasks to defaults? Custom tasks will be lost.')){localStorage.removeItem('wc_tasks_v2');showToast('Tasks reset to defaults');render();}">Reset</button>
    </div>
  </div>

  <div class="settings-section"><h3>🐕 About</h3>
    <div class="setting-row"><div><div class="label">Whiteclaw Care Tracker v3</div><div class="desc">Built with love. Routes via OSM/OSRM. Editable Todoist-style tasks with persistent notifications.</div></div></div>
  </div>`;
}

function dailyItem(t, cm) {
  const done=isDailyDone(t.id), past=(t.timeMinutes||0)<=cm;
  const daily = getDailyTasks();
  const isNext=!done&&daily.find(x=>!isDailyDone(x.id)&&(x.timeMinutes||0)>cm)?.id===t.id;
  const timeDisplay = formatTime24to12(t.time) || '';
  return `<div class="task-item ${done?'completed':''} ${!done&&past?'overdue':''}" onclick="event.stopPropagation();toggleDaily('${t.id}')">
    <div class="checkbox p${t.priority} ${done?'checked':''}"></div>
    <div style="font-size:16px">${t.icon}</div>
    <div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">
      ${timeDisplay?`<span class="task-tag tag-time">🕐 ${timeDisplay}</span>`:''}
      ${t.priority<=2?`<span class="task-tag tag-p${t.priority}">P${t.priority}</span>`:''}
      ${!done&&past?'<span class="task-tag tag-overdue">⚠️ Past due</span>':''}
      ${isNext?'<span class="task-tag" style="background:rgba(39,174,96,0.15);color:var(--green-light)">▶ Up next</span>':''}
    </div>${t.description?`<div class="task-description">${t.description}</div>`:''}</div>
    <div class="task-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="next-due ${!done&&past?'overdue':''}">${timeDisplay}</span>
      <span style="font-size:16px;cursor:pointer;opacity:0.5" onclick="event.stopPropagation();openTaskEditor('${t.id}')">✏️</span>
    </div>
  </div>`;
}

function weeklyItem(t) {
  const done=isWeeklyDone(t.id), od=isOverdue(t.nextDue)&&!done, dt=isDueToday(t.nextDue);
  return `<div class="task-item ${done?'completed':''} ${od?'overdue':''}" onclick="event.stopPropagation();toggleWeekly('${t.id}')">
    <div class="checkbox p${t.priority} ${done?'checked':''}"></div>
    <div style="font-size:16px">${t.icon}</div>
    <div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">
      <span class="task-tag tag-recurring">🔄 ${RECURRENCE_LABELS[t.recurrence]||t.recurrence}</span>
      ${t.priority<=2?`<span class="task-tag tag-p${t.priority}">P${t.priority}</span>`:''}
      ${t.cost?`<span class="task-tag tag-cost">💰 ${t.cost}</span>`:''}
      ${od?'<span class="task-tag tag-overdue">⚠️ Overdue</span>':''}
      ${t.deadline?`<span class="task-tag tag-time">🎯 Deadline: ${formatDate(t.deadline)}</span>`:''}
    </div>${t.description?`<div class="task-description">${t.description}</div>`:''}</div>
    <div class="task-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="next-due ${dt?'today':''} ${od?'overdue':''}">${formatDate(t.nextDue)}</span>
      <span style="font-size:16px;cursor:pointer;opacity:0.5" onclick="event.stopPropagation();openTaskEditor('${t.id}')">✏️</span>
    </div>
  </div>`;
}

// ===== INIT =====
render();
setInterval(render, 60000);
loadGreenSpaces();
scheduleNotificationCheck();
</script>
</body>
</html>
