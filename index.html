<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e67e22">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<title>Whiteclaw - Care Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #1a1a2e; --sidebar: #16213e; --card: #1e2a45; --card-hover: #253252;
    --accent: #e67e22; --accent-light: #f39c12; --green: #27ae60; --green-light: #2ecc71;
    --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
    --text: #ecf0f1; --text-dim: #95a5a6; --text-muted: #7f8c8d; --border: #2c3e50;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(64px + var(--safe-bottom));
  }

  /* ===== MOBILE BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--sidebar); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 calc(6px + var(--safe-bottom));
    z-index: 100;
  }
  .bottom-nav .tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 12px; border-radius: 10px; cursor: pointer;
    color: var(--text-muted); font-size: 10px; font-weight: 600;
    transition: all 0.15s; min-width: 48px;
  }
  .bottom-nav .tab .tab-icon { font-size: 20px; }
  .bottom-nav .tab.active { color: var(--accent-light); background: rgba(230,126,34,0.1); }

  /* ===== DESKTOP SIDEBAR ===== */
  .sidebar {
    width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
    padding: 24px 16px; display: none; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
  }
  @media (min-width: 769px) {
    .sidebar { display: flex; }
    .bottom-nav { display: none; }
    .main { margin-left: 260px; }
  }

  .sidebar-header { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .dog-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .sidebar-header h1 { font-size: 18px; font-weight: 800; }
  .sidebar-header p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    font-size: 14px; font-weight: 500; color: var(--text-dim);
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: var(--accent); color: white; }
  .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
  .nav-item .badge { margin-left: auto; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }

  .sidebar-stats { margin-top: auto; padding: 14px; background: var(--card); border-radius: 12px; }
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .stat-row .label { color: var(--text-dim); }
  .stat-row .value { font-weight: 700; color: var(--accent-light); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 3px; transition: width 0.5s; }

  /* ===== MAIN ===== */
  .main { padding: 20px 16px 24px; max-width: 700px; margin: 0 auto; }
  @media (min-width: 769px) { .main { padding: 32px 40px; margin: 0; margin-left: 260px; } }

  .main-header { margin-bottom: 24px; }
  .main-header h2 { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .main-header .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

  .streak { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, rgba(230,126,34,0.2), rgba(231,76,60,0.2)); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--accent-light); margin-top: 8px; }

  /* ===== NOTIFICATION BANNER ===== */
  .notif-banner {
    background: linear-gradient(135deg, var(--accent), #d35400);
    padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .notif-banner .icon { font-size: 24px; }
  .notif-banner .text { flex: 1; font-size: 13px; font-weight: 500; }
  .notif-banner .text strong { display: block; font-size: 14px; margin-bottom: 2px; }
  .notif-banner .btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }

  /* ===== SECTIONS ===== */
  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .section-header h3 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .section-header .count { font-size: 11px; color: var(--text-muted); background: var(--card); padding: 2px 8px; border-radius: 10px; font-weight: 600; }

  /* ===== TASK ITEM ===== */
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--card); border-radius: 10px;
    margin-bottom: 6px; transition: all 0.15s; cursor: pointer;
    border: 1px solid transparent; -webkit-user-select: none; user-select: none;
  }
  .task-item:active { transform: scale(0.98); background: var(--card-hover); }
  .task-item.completed { opacity: 0.45; }
  .task-item.completed .task-name { text-decoration: line-through; color: var(--text-muted); }
  .task-item.overdue { border-left: 3px solid var(--red); }

  .checkbox {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--text-muted); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s; margin-top: 1px;
  }
  .checkbox.p1 { border-color: var(--red); }
  .checkbox.p2 { border-color: var(--accent); }
  .checkbox.p3 { border-color: var(--blue); }
  .checkbox.checked { background: var(--green); border-color: var(--green); }
  .checkbox.checked::after { content: '\2713'; color: white; font-size: 13px; font-weight: 700; }

  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .task-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .tag-time { background: rgba(230,126,34,0.15); color: var(--accent-light); }
  .tag-recurring { background: rgba(155,89,182,0.15); color: #bb8fce; }
  .tag-reminder { background: rgba(52,152,219,0.15); color: var(--blue); }
  .tag-cost { background: rgba(39,174,96,0.15); color: var(--green-light); }
  .tag-overdue { background: rgba(231,76,60,0.2); color: var(--red); }
  .task-description { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .task-right { flex-shrink: 0; }
  .next-due { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .next-due.today { color: var(--accent); font-weight: 600; }
  .next-due.overdue { color: var(--red); font-weight: 600; }

  /* ===== TIMELINE ===== */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline .task-item { position: relative; }
  .timeline .task-item::before { content: ''; position: absolute; left: -20px; top: 18px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
  .timeline .task-item.completed::before { background: var(--green); }

  .current-time-bar { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 12px; color: var(--red); font-weight: 600; }
  .current-time-bar::after { content: ''; flex: 1; height: 1px; background: var(--red); opacity: 0.5; }
  .current-time-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.3); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #333; color: white; padding: 12px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== SETTINGS PANEL ===== */
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: var(--card); border-radius: 10px; margin-bottom: 6px;
  }
  .setting-row .label { font-size: 14px; font-weight: 500; }
  .setting-row .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .toggle {
    width: 44px; height: 24px; border-radius: 12px; background: var(--border);
    position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: white;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(20px); }
  .btn-primary {
    background: var(--accent); border: none; color: white;
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== ROUTE VIEW ===== */
  .route-card {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 12px; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .route-card:active { transform: scale(0.98); background: var(--card-hover); }
  .route-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .route-slot { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .route-type-badge {
    display: inline-flex; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-structured { background: rgba(52,152,219,0.15); color: var(--blue); }
  .badge-exploration { background: rgba(155,89,182,0.15); color: var(--purple); }
  .badge-efficient { background: rgba(39,174,96,0.15); color: var(--green-light); }
  .badge-wide_circle { background: rgba(52,152,219,0.15); color: var(--blue); }
  .badge-lollipop { background: rgba(155,89,182,0.15); color: var(--purple); }
  .badge-figure_eight { background: rgba(230,126,34,0.15); color: var(--accent-light); }
  .badge-zigzag { background: rgba(39,174,96,0.15); color: var(--green-light); }
  .score-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-top:4px; }
  .score-fill { height:100%; border-radius:3px; transition:width 0.5s; }
  .green-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:500; background:rgba(39,174,96,0.15); color:var(--green-light); margin:2px 2px 0 0; }
  .route-stats { display: flex; gap: 16px; margin-bottom: 12px; }
  .route-stat { font-size: 13px; color: var(--text-dim); }
  .route-stat strong { color: var(--text); font-weight: 600; }
  .route-directions { list-style: none; }
  .route-step {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid rgba(44,62,80,0.5); font-size: 13px;
  }
  .route-step:last-child { border-bottom: none; }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .step-text { flex: 1; line-height: 1.4; }
  .step-dist { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .route-actions { display: flex; gap: 8px; margin-top: 16px; }
  .route-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
  }
  .route-btn-primary { background: var(--accent); color: white; }
  .route-btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .route-back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 16px; background: none; border: none; }
  .env-modifiers { margin-top: 20px; padding: 14px; background: var(--card); border-radius: 10px; }
  .env-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; background: rgba(230,126,34,0.1); color: var(--accent-light); margin: 3px 4px 3px 0; }

  /* ===== LEAFLET MAP ===== */
  .route-map { width:100%; height:220px; border-radius:10px; overflow:hidden; margin-bottom:12px; z-index:1; }
  .route-map-detail { height:280px; }

  /* ===== LOADING SPINNER ===== */
  .route-loading { text-align:center; padding:40px 20px; }
  .route-loading .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ===== NAV OVERLAY ===== */
  .nav-overlay {
    position:fixed; top:0; left:0; right:0; bottom:0; z-index:200;
    background:var(--bg); display:flex; flex-direction:column;
  }
  .nav-map { flex:1; min-height:0; }
  .nav-panel {
    background:var(--sidebar); border-top-left-radius:20px; border-top-right-radius:20px;
    padding:16px 16px calc(16px + var(--safe-bottom)); max-height:42vh; overflow-y:auto;
    box-shadow:0 -4px 20px rgba(0,0,0,0.5);
  }
  .nav-step-active {
    background:var(--card); border-radius:10px; padding:14px; margin-bottom:12px;
  }
  .nav-step-active .instruction { font-size:18px; font-weight:700; line-height:1.3; }
  .nav-step-active .meta { font-size:13px; color:var(--text-dim); margin-top:6px; }
  .nav-upcoming { font-size:13px; color:var(--text-muted); padding:4px 0; }
  .nav-upcoming .upcoming-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .nav-controls { display:flex; gap:10px; margin-top:12px; }
  .nav-btn {
    flex:1; padding:12px; border-radius:10px; border:none;
    font-size:14px; font-weight:700; cursor:pointer; text-align:center;
  }
  .nav-btn-home { background:var(--blue); color:white; }
  .nav-btn-stop { background:var(--red); color:white; }
  .nav-btn-voice { background:var(--card); color:var(--text); border:1px solid var(--border); }
  .nav-btn-voice.active { background:rgba(39,174,96,0.2); border-color:var(--green); color:var(--green-light); }
  .nav-gps-status { font-size:11px; color:var(--text-muted); text-align:center; margin-top:8px; }
  .nav-gps-status.tracking { color:var(--green-light); }
  .nav-gps-status.error { color:var(--red); }

  /* ===== ADDRESS INPUT ===== */
  .address-input {
    width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:14px; font-family:inherit; outline:none;
  }
  .address-input:focus { border-color:var(--accent); }
  .address-current { padding:10px 14px; background:var(--card); border-radius:10px; margin-bottom:8px; }
  .walkability-badge {
    display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px;
    font-size:10px; font-weight:600; background:rgba(39,174,96,0.15); color:var(--green-light);
    margin-top:6px;
  }
</style>
</head>
<body>

<div id="app"></div>

<!-- BOTTOM NAV (mobile) -->
<div class="bottom-nav" id="bottomNav"></div>
<div id="navOverlay" style="display:none"></div>

<script>
// ===== TASK DATA (from Todoist) =====
const TASKS = {
  daily: [
    { id:'d1', name:'Long morning walk', time:'9:00 AM', timeMinutes:540, recurrence:'Every day at 9:00 AM', priority:4, reminder:30, icon:'🚶' },
    { id:'d2', name:'Breakfast', time:'9:00 AM', timeMinutes:540, recurrence:'Every day at 9:00 AM', priority:4, reminder:null, icon:'🍖' },
    { id:'d3', name:'Afternoon potty/quick walk', time:'1:00 PM', timeMinutes:780, recurrence:'Every day at 1:00 PM', priority:4, reminder:30, icon:'🐾' },
    { id:'d4', name:'Long, pre-dinner walk', time:'5:30 PM', timeMinutes:1050, recurrence:'Every day at 5:30 PM', priority:4, reminder:30, icon:'🌅' },
    { id:'d5', name:'Dinner', time:'6:00 PM', timeMinutes:1080, recurrence:'Every day at 6:00 PM', priority:4, reminder:30, icon:'🥩' },
    { id:'d6', name:'Bedtime potty/short walk', time:'9:00 PM', timeMinutes:1260, recurrence:'Every day at 9:00 PM', priority:4, reminder:30, icon:'🌙' }
  ],
  weekly: [
    { id:'w1', name:'Nail Trim - $25', recurrence:'Every 2 weeks', nextDue:'2026-05-13', priority:4, icon:'✂️', description:'Zen Dog Grooming', cost:'$25' },
    { id:'w2', name:'Weekly brush', recurrence:'Every week', nextDue:'2026-05-04', priority:1, icon:'🪮', description:'' },
    { id:'w3', name:'Bathtime', recurrence:'Every Sunday', nextDue:'2026-05-10', priority:1, icon:'🛁', description:'' },
    { id:'w4', name:'Nextguard+ medication', recurrence:'Every month', nextDue:'2026-05-19', priority:3, icon:'💊', description:'Flea & tick prevention' },
    { id:'w5', name:'Order Water Fountain Filters - $23', recurrence:'Every month', nextDue:'2026-05-04', priority:4, icon:'⛲', description:'SIBAYS 4Gal/15L replacement filters', cost:'$23' }
  ]
};

// ===== STATE =====
let state = {
  view: 'today',
  completedToday: {},
  completedWeekly: {},
  notificationsEnabled: false,
  notifiedTasks: {},
  routeDetail: null,
  navActive: false,
  navRoute: null,
  navStep: 0,
  navWatchId: null,
  navUserPos: null,
  navVoice: true,
  navMap: null,
  navMarker: null,
  navLine: null
};

function loadState() {
  try {
    state.completedToday = JSON.parse(localStorage.getItem('wc_completed') || '{}');
    state.completedWeekly = JSON.parse(localStorage.getItem('wc_weekly_completed') || '{}');
    state.notificationsEnabled = localStorage.getItem('wc_notif') === 'true';
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('wc_completed', JSON.stringify(state.completedToday));
    localStorage.setItem('wc_weekly_completed', JSON.stringify(state.completedWeekly));
    localStorage.setItem('wc_notif', state.notificationsEnabled ? 'true' : 'false');
  } catch(e) {}
}
loadState();

// ===== HELPERS =====
const getNow = () => new Date();
const getCurrentMinutes = () => { const n=getNow(); return n.getHours()*60+n.getMinutes(); };
const getTodayKey = () => { const d=getNow(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

function formatDate(ds) {
  const d=new Date(ds+'T12:00:00'), today=getNow(); today.setHours(12,0,0,0);
  const diff=Math.floor((d-today)/(864e5));
  if(diff===0) return 'Today'; if(diff===1) return 'Tomorrow';
  if(diff<0) return `${Math.abs(diff)}d overdue`;
  if(diff<7) return d.toLocaleDateString('en-US',{weekday:'long'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
const isOverdue = ds => new Date(ds+'T23:59:59') < getNow();
const isDueToday = ds => ds === getTodayKey();
const getDailyCompleted = () => state.completedToday[getTodayKey()] || [];
const isDailyDone = id => getDailyCompleted().includes(id);
const isWeeklyDone = id => (state.completedWeekly[getTodayKey()] || []).includes(id);

function toggleDaily(id) {
  const k=getTodayKey(); if(!state.completedToday[k]) state.completedToday[k]=[];
  const a=state.completedToday[k], i=a.indexOf(id);
  if(i>=0) a.splice(i,1); else { a.push(id); showToast('Done! Whiteclaw says thanks 🐕'); }
  saveState(); render();

// ===== ROUTE GENERATION ENGINE v2 (Loop Patterns + Scoring) =
// ============================================================

// Seeded PRNG (mulberry32)
function rngCreate(seed) {
  let s = seed >>> 0;
  return () => { s|=0; s=s+0x6D2B79F5|0; let t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; };
}
function rngHash(str) { let h=0; for(let i=0;i<str.length;i++) h=Math.imul(31,h)+str.charCodeAt(i)|0; return h>>>0; }

// Haversine distance in miles
function haversine(lat1,lon1,lat2,lon2) {
  const R=3958.8, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Calculate a geographic waypoint at given bearing & distance from origin
function calcWaypoint(lat, lon, bearingDeg, distMiles) {
  const R = 3958.8;
  const lat1 = lat * Math.PI / 180, lon1 = lon * Math.PI / 180;
  const brng = bearingDeg * Math.PI / 180, d = distMiles / R;
  const lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(brng));
  const lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(lat1), Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return { lat: lat2*180/Math.PI, lon: lon2*180/Math.PI };
}

// OSRM walking route fetch (FOSSGIS foot-routing — free, real sidewalks/paths)
const OSRM_FOOT = 'https://routing.openstreetmap.de/routed-foot/route/v1/driving';

async function fetchWalkingRoute(waypoints) {
  const coordStr = waypoints.map(w => `${w.lon},${w.lat}`).join(';');
  const url = `${OSRM_FOOT}/${coordStr}?overview=full&geometries=geojson&steps=true`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Route server returned ' + resp.status);
  const data = await resp.json();
  if (data.code !== 'Ok' || !data.routes?.length) return null;
  return data.routes[0];
}

// Extract turn-by-turn directions from OSRM response
function extractDirections(osrmRoute, homeAddr) {
  const dirs = [];
  for (const leg of osrmRoute.legs) {
    for (const step of leg.steps) {
      if (step.distance < 3 && step.maneuver.type !== 'arrive' && step.maneuver.type !== 'depart') continue;
      const name = step.name || 'path';
      const distMi = Math.round(step.distance * 0.000621371 * 100) / 100;
      let instruction = '';
      switch(step.maneuver.type) {
        case 'depart':
          instruction = `Head ${step.maneuver.modifier||'straight'} on ${name}`.replace(/  +/g,' ').trim(); break;
        case 'arrive':
          instruction = `Arrive at ${homeAddr||'destination'}`; break;
        case 'turn': case 'end of road': case 'fork': {
          const mod = step.maneuver.modifier||'';
          if (mod.includes('sharp') && mod.includes('left')) instruction = `Sharp left onto ${name}`;
          else if (mod.includes('sharp') && mod.includes('right')) instruction = `Sharp right onto ${name}`;
          else if (mod.includes('left')) instruction = `Turn left onto ${name}`;
          else if (mod.includes('right')) instruction = `Turn right onto ${name}`;
          else if (mod.includes('straight')) instruction = `Continue straight on ${name}`;
          else if (mod.includes('uturn')) instruction = `U-turn onto ${name}`;
          else instruction = `Continue on ${name}`;
          break;
        }
        case 'new name': case 'continue':
          instruction = `Continue onto ${name}`; break;
        case 'roundabout': case 'rotary':
          instruction = `At roundabout, exit onto ${name}`; break;
        default:
          instruction = `Continue on ${name}`;
      }
      dirs.push({ instruction, street: name, distance: distMi });
    }
  }
  const merged = [];
  for (const d of dirs) {
    if (merged.length && merged[merged.length-1].street === d.street && d.street && d.instruction.startsWith('Continue')) {
      merged[merged.length-1].distance = Math.round((merged[merged.length-1].distance + d.distance)*100)/100;
    } else { merged.push({...d}); }
  }
  return merged;
}

// Route hashing for anti-repetition
function hashRouteCoords(coords) {
  const step = Math.max(1, Math.floor(coords.length / 20));
  const sample = coords.filter((_, i) => i % step === 0);
  return sample.map(c => `${Math.round(c[0]*200)},${Math.round(c[1]*200)}`).join('|');
}
function routeSimilarity(h1, h2) {
  if (!h1||!h2) return 0;
  const s1=new Set(h1.split('|')), s2=new Set(h2.split('|'));
  let shared=0; s1.forEach(x=>{ if(s2.has(x)) shared++; });
  return shared/Math.max(s1.size, s2.size);
}

// ===== LOOP PATTERN DEFINITIONS =====
const LOOP_PATTERNS = {
  wide_circle: {
    desc: 'Wide neighborhood loop', icon: '🔵',
    generate(home, rng, attempt) {
      const n = 3 + Math.floor(rng() * 2); // 3-4 waypoints in a circle
      const baseAngle = rng() * 360;
      const radius = 0.14 + rng() * 0.08 + attempt * 0.015; // 0.14-0.22+ mi
      const wps = [];
      for (let i = 0; i < n; i++) {
        const angle = baseAngle + (i * 360 / n) + (rng() - 0.5) * 30;
        const r = radius + (rng() - 0.5) * 0.04;
        wps.push(calcWaypoint(home.lat, home.lon, angle, r));
      }
      return wps;
    }
  },
  lollipop: {
    desc: 'Stem + loop pattern', icon: '🍭',
    generate(home, rng, attempt) {
      const stemBearing = rng() * 360;
      const stemDist = 0.15 + rng() * 0.10 + attempt * 0.01; // 0.15-0.25+ mi
      const stemEnd = calcWaypoint(home.lat, home.lon, stemBearing, stemDist);
      const loopRadius = 0.08 + rng() * 0.06; // 0.08-0.14 mi
      const wps = [stemEnd];
      for (let i = 0; i < 3; i++) {
        const angle = stemBearing + 90 + (i * 120) + (rng() - 0.5) * 20;
        wps.push(calcWaypoint(stemEnd.lat, stemEnd.lon, angle, loopRadius));
      }
      return wps;
    }
  },
  figure_eight: {
    desc: 'Figure-8 dual loop', icon: '8️⃣',
    generate(home, rng, attempt) {
      const bearing1 = rng() * 360;
      const bearing2 = (bearing1 + 180 + (rng() - 0.5) * 40) % 360;
      const dist = 0.12 + rng() * 0.08 + attempt * 0.01;
      const wps = [];
      // First lobe
      const c1 = calcWaypoint(home.lat, home.lon, bearing1, dist);
      wps.push(calcWaypoint(c1.lat, c1.lon, (bearing1 + 90) % 360, 0.05 + rng() * 0.04));
      wps.push(c1);
      // Second lobe
      const c2 = calcWaypoint(home.lat, home.lon, bearing2, dist);
      wps.push(calcWaypoint(c2.lat, c2.lon, (bearing2 + 90) % 360, 0.05 + rng() * 0.04));
      wps.push(c2);
      return wps;
    }
  },
  zigzag: {
    desc: 'Zigzag neighborhood walk', icon: '⚡',
    generate(home, rng, attempt) {
      const mainBearing = rng() * 360;
      const n = 3 + Math.floor(rng() * 2); // 3-4 waypoints
      const spread = 0.06 + rng() * 0.04; // lateral spread
      const wps = [];
      for (let i = 0; i < n; i++) {
        const fwd = (i + 1) * (0.06 + rng() * 0.04) + attempt * 0.005;
        const side = ((i % 2 === 0) ? 1 : -1) * (spread + rng() * 0.03);
        const fwdPt = calcWaypoint(home.lat, home.lon, mainBearing, fwd);
        const sideBearing = (mainBearing + ((i % 2 === 0) ? 90 : -90) + 360) % 360;
        wps.push(calcWaypoint(fwdPt.lat, fwdPt.lon, sideBearing, Math.abs(side)));
      }
      return wps;
    }
  }
};
const PATTERN_KEYS = Object.keys(LOOP_PATTERNS);

// ===== GREEN SPACE DISCOVERY (Overpass API) =====
let greenSpacesCache = null;
let greenSpacesCacheTime = 0;
const GREEN_CACHE_MS = 7 * 24 * 60 * 60 * 1000; // 7 days

function loadGreenSpacesFromStorage() {
  try {
    const d = JSON.parse(localStorage.getItem('wc_green_spaces'));
    if (d && d.time && (Date.now() - d.time) < GREEN_CACHE_MS && d.home) {
      const home = getHomeLocation();
      if (haversine(d.home.lat, d.home.lon, home.lat, home.lon) < 0.5) {
        greenSpacesCache = d.spaces;
        greenSpacesCacheTime = d.time;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

async function loadGreenSpaces() {
  if (greenSpacesCache && (Date.now() - greenSpacesCacheTime) < GREEN_CACHE_MS) return greenSpacesCache;
  if (loadGreenSpacesFromStorage()) return greenSpacesCache;

  const home = getHomeLocation();
  const radius = 800; // meters
  const query = `[out:json][timeout:10];(
    node["leisure"~"park|garden|dog_park|playground"](around:${radius},${home.lat},${home.lon});
    way["leisure"~"park|garden|dog_park|playground"](around:${radius},${home.lat},${home.lon});
    node["landuse"="grass"](around:${radius},${home.lat},${home.lon});
    way["natural"="grassland"](around:${radius},${home.lat},${home.lon});
  );out center body;`;

  try {
    const resp = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST', body: 'data=' + encodeURIComponent(query),
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    if (!resp.ok) throw new Error('Overpass failed');
    const data = await resp.json();
    const spaces = [];
    const seen = new Set();
    for (const el of data.elements) {
      const lat = el.lat || el.center?.lat;
      const lon = el.lon || el.center?.lon;
      if (!lat || !lon) continue;
      const key = `${Math.round(lat*1000)},${Math.round(lon*1000)}`;
      if (seen.has(key)) continue;
      seen.add(key);
      const tags = el.tags || {};
      const name = tags.name || tags.leisure || tags.landuse || 'green space';
      const type = tags.leisure || tags.landuse || tags.natural || 'park';
      spaces.push({ lat, lon, name, type, dist: haversine(home.lat, home.lon, lat, lon) });
    }
    spaces.sort((a, b) => a.dist - b.dist);
    greenSpacesCache = spaces.slice(0, 15); // keep top 15 nearby
    greenSpacesCacheTime = Date.now();
    try {
      localStorage.setItem('wc_green_spaces', JSON.stringify({
        spaces: greenSpacesCache, time: greenSpacesCacheTime,
        home: { lat: home.lat, lon: home.lon }
      }));
    } catch(e) {}
    return greenSpacesCache;
  } catch(e) {
    console.warn('Green space lookup failed:', e.message);
    greenSpacesCache = greenSpacesCache || [];
    return greenSpacesCache;
  }
}

// Pick 1-2 green spaces near the route waypoints as soft waypoints
function pickGreenSpaceWaypoints(wps, greenSpaces, rng) {
  if (!greenSpaces || !greenSpaces.length) return [];
  const picked = [];
  for (const gs of greenSpaces) {
    if (picked.length >= 2) break;
    // Check if green space is reasonably close to any waypoint (within 0.15 mi)
    const near = wps.some(w => haversine(w.lat, w.lon, gs.lat, gs.lon) < 0.15);
    if (near && rng() > 0.3) { // 70% chance to include nearby green space
      picked.push({ lat: gs.lat, lon: gs.lon, name: gs.name, type: gs.type });
    }
  }
  return picked;
}

// ===== MAIN ROAD DETECTION =====
const MAIN_ROAD_RE = /\b(boulevard|blvd|highway|hwy|parkway|pkwy|expressway|expy|interstate|i-\d|freeway|fwy|turnpike|tpke|us route|us-\d|state road|sr-?\d|county road|cr-?\d)\b/i;

function analyzeStreets(directions) {
  let totalDist = 0, residentialDist = 0, mainRoadDist = 0;
  const streets = [];
  for (const d of directions) {
    totalDist += d.distance;
    const isMain = MAIN_ROAD_RE.test(d.street);
    if (isMain) mainRoadDist += d.distance;
    else residentialDist += d.distance;
    streets.push({ name: d.street, dist: d.distance, isMain });
  }
  return {
    totalDist, residentialDist, mainRoadDist,
    residentialPct: totalDist > 0 ? Math.round((residentialDist / totalDist) * 100) : 100,
    mainRoadPct: totalDist > 0 ? Math.round((mainRoadDist / totalDist) * 100) : 0,
    streets
  };
}

// ===== OUT-AND-BACK DETECTION =====
function isOutAndBack(coords) {
  if (coords.length < 20) return false;
  const mid = Math.floor(coords.length / 2);
  const first = coords.slice(0, mid);
  const second = coords.slice(mid).reverse();
  const check = Math.min(first.length, second.length, 10);
  let matches = 0;
  for (let i = 0; i < check; i++) {
    const fi = Math.floor(i * first.length / check);
    const si = Math.floor(i * second.length / check);
    if (fi < first.length && si < second.length) {
      const d = haversine(first[fi][0], first[fi][1], second[si][0], second[si][1]);
      if (d < 0.02) matches++;
    }
  }
  return (matches / check) > 0.5; // >50% overlap = out-and-back
}

// ===== ROUTE SCORING SYSTEM (0-100) =====
function scoreRoute(route, greenSpaces, recentHashes) {
  let score = 0;
  const breakdown = {};

  // 1. Loop closure (15 pts) — start must equal end within 0.02 mi
  const coords = route.coordinates;
  const closureDist = haversine(coords[0][0], coords[0][1], coords[coords.length-1][0], coords[coords.length-1][1]);
  if (closureDist <= 0.005) breakdown.closure = 15;
  else if (closureDist <= 0.02) breakdown.closure = 12;
  else if (closureDist <= 0.05) breakdown.closure = 5;
  else breakdown.closure = 0;
  score += breakdown.closure;

  // 2. Distance accuracy (25 pts) — target 1.4-1.6 mi
  const d = route.distance;
  if (d >= 1.35 && d <= 1.65) breakdown.distance = 25;
  else if (d >= 1.2 && d <= 1.8) breakdown.distance = 18;
  else if (d >= 1.0 && d <= 2.0) breakdown.distance = 10;
  else breakdown.distance = 3;
  score += breakdown.distance;

  // 3. Street type analysis (25 pts) — favor residential, penalize main roads
  const sa = analyzeStreets(route.directions || []);
  if (sa.residentialPct >= 90) breakdown.streets = 25;
  else if (sa.residentialPct >= 75) breakdown.streets = 20;
  else if (sa.residentialPct >= 60) breakdown.streets = 12;
  else breakdown.streets = 5;
  score += breakdown.streets;
  route.streetAnalysis = sa;

  // 4. Green space proximity (20 pts)
  let greenScore = 0;
  if (greenSpaces && greenSpaces.length > 0) {
    let nearCount = 0;
    for (const gs of greenSpaces) {
      const near = coords.some(c => haversine(c[0], c[1], gs.lat, gs.lon) < 0.08);
      if (near) nearCount++;
      if (nearCount >= 2) break;
    }
    if (nearCount >= 2) greenScore = 20;
    else if (nearCount === 1) greenScore = 12;
    else greenScore = 3;
  } else {
    greenScore = 10; // no data available, neutral score
  }
  breakdown.greenSpace = greenScore;
  score += greenScore;

  // 5. Uniqueness vs recent routes (15 pts)
  if (!recentHashes || recentHashes.length === 0) {
    breakdown.uniqueness = 15;
  } else {
    const maxSim = Math.max(...recentHashes.map(h => routeSimilarity(route.hash, h)));
    if (maxSim < 0.2) breakdown.uniqueness = 15;
    else if (maxSim < 0.35) breakdown.uniqueness = 10;
    else if (maxSim < 0.5) breakdown.uniqueness = 5;
    else breakdown.uniqueness = 0;
  }
  score += breakdown.uniqueness;

  // Penalty: out-and-back routes
  if (isOutAndBack(coords)) {
    breakdown.outAndBackPenalty = -15;
    score = Math.max(0, score - 15);
  }

  return { score, breakdown };
}

// ===== ASYNC ROUTE GENERATION STATE =====
let routeLoadingState = 'idle';
let routeLoadingMsg = '';

// Generate a single walking loop route via OSRM with pattern-based waypoints
async function generateSingleOSRMRoute(home, rng, recentHashes, greenSpaces) {
  const patternIdx = Math.floor(rng() * PATTERN_KEYS.length);
  let bestRoute = null, bestScore = -1;

  for (let attempt = 0; attempt < 12; attempt++) {
    // Cycle through patterns, starting from random one
    const pKey = PATTERN_KEYS[(patternIdx + attempt) % PATTERN_KEYS.length];
    const pattern = LOOP_PATTERNS[pKey];
    const waypoints = pattern.generate(home, rng, attempt);

    // Inject green space soft waypoints
    const greenWPs = pickGreenSpaceWaypoints(waypoints, greenSpaces || [], rng);
    const allWPs = [...waypoints];
    for (const gw of greenWPs) {
      // Insert green waypoint near middle of route
      const insertIdx = Math.floor(allWPs.length / 2);
      allWPs.splice(insertIdx, 0, gw);
    }

    // Always: home -> waypoints -> home (guarantees loop)
    const coordSeq = [{ lat: home.lat, lon: home.lon }, ...allWPs, { lat: home.lat, lon: home.lon }];

    try {
      const osrm = await fetchWalkingRoute(coordSeq);
      if (!osrm) continue;

      const distMi = osrm.distance * 0.000621371;
      // Accept 1.0-2.2, prefer 1.35-1.65
      if (distMi < 0.9 || distMi > 2.4) continue;

      const coordinates = osrm.geometry.coordinates.map(c => [c[1], c[0]]);

      // Strict loop closure: start must be within 0.02 mi of end
      const startEnd = haversine(coordinates[0][0], coordinates[0][1], coordinates[coordinates.length-1][0], coordinates[coordinates.length-1][1]);
      if (startEnd > 0.02) continue;

      // Reject out-and-back
      if (isOutAndBack(coordinates)) continue;

      const directions = extractDirections(osrm, home.address);
      const hash = hashRouteCoords(coordinates);

      const candidate = {
        distance: Math.round(distMi * 100) / 100,
        duration: Math.round(osrm.duration / 60),
        coordinates, directions, hash,
        pattern: pKey,
        greenSpots: greenWPs.map(g => ({ lat: g.lat, lon: g.lon, name: g.name, type: g.type }))
      };

      const { score, breakdown } = scoreRoute(candidate, greenSpaces, recentHashes);
      candidate.score = score;
      candidate.scoreBreakdown = breakdown;

      // Dynamic threshold: accept progressively lower scores as attempts increase
      const threshold = attempt < 4 ? 45 : (attempt < 8 ? 35 : 25);
      if (score >= threshold && score > bestScore) {
        bestRoute = candidate;
        bestScore = score;
      }

      // If we found a great route, stop early
      if (bestScore >= 65) break;

    } catch(e) {
      console.warn('OSRM attempt', attempt, 'failed:', e.message);
      if (attempt < 11) await new Promise(r => setTimeout(r, 300));
    }
  }
  return bestRoute;
}

// Regen counter
function getRegenCounter() { try { return parseInt(localStorage.getItem('wc_regen_ctr')||'0',10); } catch(e) { return 0; } }
function bumpRegenCounter() { const c=getRegenCounter()+1; try { localStorage.setItem('wc_regen_ctr',String(c)); } catch(e){} return c; }

// Generate AM + PM routes for a date
async function generateDailyRoutes(dateKey) {
  const home = getHomeLocation();
  const ctr = getRegenCounter();
  const recent = getRecentRouteHashes(7);

  // Load green spaces (cached, non-blocking on failure)
  let greenSpaces = [];
  try { greenSpaces = await loadGreenSpaces(); } catch(e) {}

  const amSeed = rngHash(`${dateKey}-am-${ctr}-${home.lat.toFixed(4)}`);
  const pmSeed = rngHash(`${dateKey}-pm-${ctr}-${home.lat.toFixed(4)}`);
  const amRng = rngCreate(amSeed), pmRng = rngCreate(pmSeed);

  routeLoadingMsg = 'Scouting morning neighborhood loop...';
  render();
  const amRaw = await generateSingleOSRMRoute(home, amRng, recent, greenSpaces);
  const am = amRaw ? { ...amRaw, id:`route-am-${dateKey}-${ctr}`, slot:'am' } : null;

  routeLoadingMsg = 'Mapping evening walk route...';
  render();
  const pmRecent = [...recent, am?.hash].filter(Boolean);
  const pmRaw = await generateSingleOSRMRoute(home, pmRng, pmRecent, greenSpaces);
  const pm = pmRaw ? { ...pmRaw, id:`route-pm-${dateKey}-${ctr}`, slot:'pm' } : null;

  const result = { date:dateKey, am, pm };
  saveRouteHistory(dateKey, result);
  return result;
}

// Route history persistence
function loadRouteHistory() { try { return JSON.parse(localStorage.getItem('wc_routes')||'{}'); } catch(e) { return {}; } }
function saveRouteHistory(dateKey, routes) {
  const h=loadRouteHistory(); h[dateKey]=routes;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-14);
  Object.keys(h).forEach(k=>{ if(new Date(k+'T12:00:00')<cutoff) delete h[k]; });
  try { localStorage.setItem('wc_routes',JSON.stringify(h)); } catch(e){}
}
function getRecentRouteHashes(days) {
  const h=loadRouteHistory(), hashes=[];
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
  Object.entries(h).forEach(([k,v])=>{
    if(new Date(k+'T12:00:00')>=cutoff) {
      if(v.am?.hash) hashes.push(v.am.hash);
      if(v.pm?.hash) hashes.push(v.pm.hash);
    }
  });
  return hashes;
}

function getTodayRoutes() {
  const key=getTodayKey();
  const cached=loadRouteHistory()[key];
  if (cached && (cached.am || cached.pm)) return cached;
  return null;
}

async function loadTodayRoutes() {
  if (routeLoadingState === 'loading') return;
  const existing = getTodayRoutes();
  if (existing) { routeLoadingState = 'loaded'; render(); return; }

  routeLoadingState = 'loading';
  routeLoadingMsg = 'Finding neighborhood loops near you...';
  render();

  try {
    await generateDailyRoutes(getTodayKey());
    routeLoadingState = 'loaded';
  } catch(e) {
    console.error('Route gen failed:', e);
    routeLoadingState = 'error';
    routeLoadingMsg = e.message || 'Route generation failed';
  }
  render();
}

async function regenerateRoutes() {
  bumpRegenCounter();
  const key=getTodayKey();
  const h=loadRouteHistory(); delete h[key];
  try { localStorage.setItem('wc_routes',JSON.stringify(h)); } catch(e){}
  state.routeDetail=null;
  routeLoadingState='idle';
  showToast('Generating new routes...');
  loadTodayRoutes();
}

let routeMapInstances = {};

function initRouteMap(containerId, route, fitPad) {
  if(routeMapInstances[containerId]) { try{routeMapInstances[containerId].remove();}catch(e){} delete routeMapInstances[containerId]; }
  const el=document.getElementById(containerId);
  if(!el || !route?.coordinates?.length) return null;

  const map=L.map(el, { zoomControl:false, attributionControl:false });
  L.control.zoom({ position:'topright' }).addTo(map);

  // Esri satellite tiles (free, no key)
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:19 }).addTo(map);

  const coords=route.coordinates;
  // Route polyline (glow + core)
  L.polyline(coords, { color:'#e67e22', weight:5, opacity:0.3 }).addTo(map);
  L.polyline(coords, { color:'#f39c12', weight:3, opacity:0.9 }).addTo(map);

  // Home marker
  const home=getHomeLocation();
  const homeIcon=L.divIcon({ className:'', html:'<div style="font-size:22px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8))">🏠</div>', iconSize:[28,28], iconAnchor:[14,14] });
  L.marker(coords[0], { icon:homeIcon }).addTo(map).bindPopup('🏠 '+home.address);

  // Farthest point marker
  let maxD=0, fIdx=0;
  coords.forEach((c,i)=>{ const d=Math.sqrt((c[0]-coords[0][0])**2+(c[1]-coords[0][1])**2); if(d>maxD){maxD=d;fIdx=i;} });
  if(fIdx>0) {
    const wpIcon=L.divIcon({ className:'', html:'<div style="width:10px;height:10px;background:#9b59b6;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.5)"></div>', iconSize:[14,14], iconAnchor:[7,7] });
    L.marker(coords[fIdx], { icon:wpIcon }).addTo(map);
  }

  // Green space markers
  if(route.greenSpots?.length) {
    for(const gs of route.greenSpots) {
      const gsIcon=L.divIcon({ className:'', html:'<div style="font-size:16px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6))">🌿</div>', iconSize:[20,20], iconAnchor:[10,10] });
      L.marker([gs.lat, gs.lon], { icon:gsIcon }).addTo(map).bindPopup(`🌿 ${gs.name||'Green space'}`);
    }
  }

  map.fitBounds(L.latLngBounds(coords), { padding:fitPad||[20,20] });
  routeMapInstances[containerId]=map;
  return map;
}

function postRenderMaps() {
  const routes=getTodayRoutes();
  if(!routes) return;
  if(state.view==='routes' && !state.routeDetail) {
    if(routes.am) setTimeout(()=>initRouteMap('map-am',routes.am,[15,15]),80);
    if(routes.pm) setTimeout(()=>initRouteMap('map-pm',routes.pm,[15,15]),80);
  }
  if(state.view==='routes' && state.routeDetail) {
    const r=routes[state.routeDetail];
    if(r) setTimeout(()=>initRouteMap('map-detail',r,[25,25]),80);
  }
}

function startNavigation(slot) {
  const routes=getTodayRoutes();
  if(!routes) { showToast('No routes loaded'); return; }
  const route=routes[slot];
  if(!route) { showToast('No route found'); return; }

  state.navActive=true;
  state.navRoute=route;
  state.navStep=0;
  state.navUserPos=null;

  renderNavOverlay();
  startGPS();
  if(state.navVoice && route.directions[0]) speak(route.directions[0].instruction);
}

function stopNavigation() {
  state.navActive=false;
  if(state.navWatchId!==null) { navigator.geolocation.clearWatch(state.navWatchId); state.navWatchId=null; }
  if(state.navMap) { try{state.navMap.remove();}catch(e){} state.navMap=null; }
  state.navMarker=null; state.navLine=null; state.navRoute=null;
  document.getElementById('navOverlay').style.display='none';
  if(window.speechSynthesis) speechSynthesis.cancel();
  render();
}

function speak(text) {
  if(!state.navVoice || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.95; u.pitch=1; u.volume=1;
  speechSynthesis.speak(u);
}

function toggleNavVoice() {
  state.navVoice=!state.navVoice;
  if(!state.navVoice && window.speechSynthesis) speechSynthesis.cancel();
  renderNavPanel();
}

function startGPS() {
  if(!navigator.geolocation) { updateGPSStatus('GPS not available','error'); return; }
  updateGPSStatus('Acquiring GPS...','');
  state.navWatchId=navigator.geolocation.watchPosition(
    pos => { state.navUserPos=[pos.coords.latitude, pos.coords.longitude]; updateGPSStatus('GPS tracking active','tracking'); updateNavPosition(); },
    err => { updateGPSStatus('GPS error: '+err.message,'error'); },
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
}

function updateGPSStatus(msg, cls) {
  const el=document.getElementById('gps-status');
  if(el) { el.textContent=msg; el.className='nav-gps-status'+(cls?' '+cls:''); }
}

function updateNavPosition() {
  if(!state.navActive||!state.navRoute||!state.navUserPos) return;

  if(state.navMap && state.navMarker) state.navMarker.setLatLng(state.navUserPos);

  const coords=state.navRoute.coordinates;
  const dirs=state.navRoute.directions;

  // Find closest point on route to determine progress
  let closestIdx=0, closestDist=Infinity;
  coords.forEach((c,i)=>{
    const d=haversine(state.navUserPos[0],state.navUserPos[1],c[0],c[1]);
    if(d<closestDist){closestDist=d;closestIdx=i;}
  });

  // Map coordinate progress to direction steps
  // Each step covers a portion of coordinates proportional to its distance
  let totalRouteDist=0;
  dirs.forEach(d=>totalRouteDist+=d.distance||0);

  let accumCoordIdx=0;
  for(let s=0; s<dirs.length-1; s++) {
    const stepFrac=(dirs[s].distance||0)/Math.max(totalRouteDist,0.01);
    const stepCoords=Math.max(1,Math.round(stepFrac*coords.length));
    accumCoordIdx+=stepCoords;

    if(closestIdx < accumCoordIdx && s > state.navStep) {
      state.navStep=s;
      renderNavPanel();
      if(state.navVoice && dirs[s]) speak(dirs[s].instruction);
      break;
    }
  }

  // Update remaining distance
  let remaining=0;
  for(let i=state.navStep;i<dirs.length;i++) remaining+=dirs[i].distance||0;
  const remEl=document.getElementById('nav-remaining');
  if(remEl) remEl.textContent=remaining.toFixed(2)+' mi remaining';
}

// Take Me Home — real OSRM walking route from current position
async function takeMeHome() {
  if(!state.navActive||!state.navUserPos) { showToast('Need GPS fix first'); return; }

  const home=getHomeLocation();
  const distToHome=haversine(state.navUserPos[0],state.navUserPos[1],home.lat,home.lon);

  if(distToHome<0.02) { speak("You're already home!"); showToast("You're near home! 🏠"); return; }

  showToast('Finding fastest route home...');

  try {
    const osrm = await fetchWalkingRoute([
      { lat:state.navUserPos[0], lon:state.navUserPos[1] },
      { lat:home.lat, lon:home.lon }
    ]);

    if(!osrm) { showToast('Cannot find route home'); return; }

    const coordinates=osrm.geometry.coordinates.map(c=>[c[1],c[0]]);
    const directions=extractDirections(osrm, home.address);
    const dist=Math.round(osrm.distance*0.000621371*100)/100;

    state.navRoute={
      id:'route-home-now', slot:'home', type:'efficient',
      distance:dist, duration:Math.round(osrm.duration/60),
      directions, coordinates, hash:hashRouteCoords(coordinates)
    };
    state.navStep=0;
    speak("Rerouting home. "+directions[0].instruction);
    showToast('Heading home! 🏠');
    renderNavOverlay();
  } catch(e) {
    showToast('Route home failed: '+e.message);
  }
}

function renderNavOverlay() {
  if(!state.navActive) return;
  const overlay=document.getElementById('navOverlay');
  overlay.style.display='flex';
  overlay.className='nav-overlay';
  overlay.innerHTML=`<div id="nav-map-container" class="nav-map"></div><div class="nav-panel" id="nav-panel"></div>`;
  renderNavPanel();

  setTimeout(()=>{
    const route=state.navRoute;
    if(!route) return;
    const el=document.getElementById('nav-map-container');
    if(!el) return;

    state.navMap=L.map(el, { zoomControl:false, attributionControl:false });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:19 }).addTo(state.navMap);

    const coords=route.coordinates;
    state.navLine=L.polyline(coords,{color:'#f39c12',weight:4,opacity:0.9}).addTo(state.navMap);
    L.polyline(coords,{color:'#e67e22',weight:6,opacity:0.3}).addTo(state.navMap);

    const homeIcon=L.divIcon({className:'',html:'<div style="font-size:20px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8))">🏠</div>',iconSize:[24,24],iconAnchor:[12,12]});
    L.marker(coords[0],{icon:homeIcon}).addTo(state.navMap);

    const userIcon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:#3498db;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(52,152,219,0.6)"></div>',iconSize:[20,20],iconAnchor:[10,10]});
    state.navMarker=L.marker(state.navUserPos||coords[0],{icon:userIcon}).addTo(state.navMap);

    state.navMap.fitBounds(L.latLngBounds(coords),{padding:[40,40]});
  },100);
}

function renderNavPanel() {
  const panel=document.getElementById('nav-panel');
  if(!panel||!state.navRoute) return;
  const dirs=state.navRoute.directions;
  const cur=dirs[state.navStep];
  const next=dirs[state.navStep+1];

  let remaining=0;
  for(let i=state.navStep;i<dirs.length;i++) remaining+=dirs[i].distance||0;

  panel.innerHTML=`
    <div class="nav-step-active">
      <div class="instruction">${cur?cur.instruction:'Route complete!'}</div>
      <div class="meta">${cur?.distance?'📏 '+cur.distance+' mi':''}&nbsp;&nbsp;<span id="nav-remaining">${remaining.toFixed(2)} mi remaining</span></div>
    </div>
    ${next?`<div class="nav-upcoming"><div class="upcoming-label">Then</div>${next.instruction} (${next.distance} mi)</div>`:''}
    <div class="nav-controls">
      <button class="nav-btn nav-btn-home" onclick="takeMeHome()">🏠 Take Me Home</button>
      <button class="nav-btn nav-btn-voice ${state.navVoice?'active':''}" onclick="toggleNavVoice()">${state.navVoice?'🔊 On':'🔇 Off'}</button>
      <button class="nav-btn nav-btn-stop" onclick="stopNavigation()">✖ End</button>
    </div>
    <div id="gps-status" class="nav-gps-status">Waiting for GPS...</div>`;
}

  document.getElementById('bottomNav').innerHTML = [
    ['today','☀️','Today'],['daily','📋','Daily'],['weekly','📆','Weekly'],
    ['routes','🗺️','Routes'],['timeline','⏱️','Timeline'],['settings','⚙️','Settings']
  ].map(([v,ic,lb])=>`<div class="tab ${state.view===v?'active':''}" onclick="setView('${v}')"><span class="tab-icon">${ic}</span>${lb}</div>`).join('');

  // Desktop sidebar
  const sidebarHTML = `
    <div class="sidebar">
      <div class="sidebar-header"><div class="dog-avatar">🐕</div><div><h1>Whiteclaw</h1><p>Care Tracker</p></div></div>
      <div style="margin-bottom:24px">
        ${['today,☀️,Today','daily,📋,Daily Routine','weekly,📆,Weekly / Regular','routes,🗺️,Walking Routes','timeline,⏱️,Timeline','schedule,🔄,All Schedules','settings,⚙️,Settings'].map(x=>{
          const [v,ic,lb]=x.split(',');
          return `<div class="nav-item ${state.view===v?'active':''}" onclick="setView('${v}')"><span class="icon">${ic}</span>${lb}</div>`;
        }).join('')}
      </div>
      <div class="sidebar-stats">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">Today's Progress</div>
        <div class="stat-row"><span class="label">Completed</span><span class="value">${s.done}/${s.total}</span></div>
        <div class="stat-row"><span class="label">Daily</span><span class="value">${s.dd}/${s.td}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%"></div></div>
        ${s.pct===100?'<div class="streak" style="margin-top:10px">🔥 All done!</div>':''}
      </div>
    </div>`;

  // Destroy old map instances
  Object.keys(routeMapInstances).forEach(k=>{
    try{routeMapInstances[k].remove();}catch(e){}
    delete routeMapInstances[k];
  });

  const mainHTML = renderView(s, dateStr, timeStr, cm);
  document.getElementById('app').innerHTML = sidebarHTML + `<div class="main">${mainHTML}</div>`;

  postRenderMaps();
}

function renderView(s, dateStr, timeStr, cm) {
  switch(state.view) {
    case 'today': return viewToday(s,dateStr,timeStr,cm);
    case 'daily': return viewDaily(cm);
    case 'weekly': return viewWeekly();
    case 'timeline': return viewTimeline(cm);
    case 'routes': return viewRoutes();
    case 'schedule': return viewSchedule();
    case 'settings': return viewSettings();
    default: return viewToday(s,dateStr,timeStr,cm);
  }
}

function notifBanner() {
  if(state.notificationsEnabled && Notification.permission==='granted') return '';
  if(!('Notification' in window)) return '';
  return `<div class="notif-banner" onclick="requestNotifPermission()">
    <span class="icon">🔔</span>
    <div class="text"><strong>Enable Reminders</strong>Get notified when it's time for Whiteclaw's tasks</div>
    <button class="btn">Enable</button>
  </div>`;
}

function viewToday(s, dateStr, timeStr, cm) {
  const overdue=TASKS.weekly.filter(t=>isOverdue(t.nextDue)&&!isWeeklyDone(t.id));
  const dueW=TASKS.weekly.filter(t=>isDueToday(t.nextDue));
  const past=TASKS.daily.filter(t=>t.timeMinutes<=cm), upcoming=TASKS.daily.filter(t=>t.timeMinutes>cm);

  return `<div class="main-header">
    <h2>☀️ Today</h2><div class="subtitle">${dateStr} &bull; ${timeStr}</div>
    <div class="streak">🐾 ${s.total-s.done?s.total-s.done+' tasks left':'All done! 🔥'}</div>
  </div>
  ${notifBanner()}
  ${overdue.length?`<div class="section"><div class="section-header"><h3>⚠️ Overdue</h3><span class="count">${overdue.length}</span></div>${overdue.map(weeklyItem).join('')}</div>`:''}
  <div class="section"><div class="section-header"><h3>🐕 Daily Routine</h3><span class="count">${s.dd}/${s.td}</span></div>
    ${past.map(t=>dailyItem(t,cm)).join('')}
    ${upcoming.length&&past.length?`<div class="current-time-bar"><span class="dot"></span>Now — ${timeStr}</div>`:''}
    ${upcoming.map(t=>dailyItem(t,cm)).join('')}
  </div>
  ${dueW.length?`<div class="section"><div class="section-header"><h3>📆 Also Due Today</h3><span class="count">${dueW.length}</span></div>${dueW.map(weeklyItem).join('')}</div>`:''}`;
}

function viewDaily(cm) {
  return `<div class="main-header"><h2>📋 Daily Routine</h2><div class="subtitle">Every single day</div></div>
  <div class="section">${TASKS.daily.map(t=>dailyItem(t,cm)).join('')}</div>`;
}

function viewWeekly() {
  return `<div class="main-header"><h2>📆 Weekly / Regular</h2><div class="subtitle">Grooming, health & supplies</div></div>
  <div class="section">${TASKS.weekly.map(weeklyItem).join('')}</div>`;
}

function viewTimeline(cm) {
  const timeStr=getNow().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  let html=`<div class="main-header"><h2>⏱️ Timeline</h2><div class="subtitle">Whiteclaw's day at a glance</div></div><div class="timeline">`;
  let ins=false;
  TASKS.daily.forEach(t=>{
    if(!ins&&t.timeMinutes>cm){ html+=`<div class="current-time-bar" style="margin-left:-24px"><span class="dot"></span>Now — ${timeStr}</div>`; ins=true; }
    html+=dailyItem(t,cm);
  });
  if(!ins) html+=`<div class="current-time-bar" style="margin-left:-24px"><span class="dot"></span>Now — ${timeStr}</div>`;
  return html+'</div>';
}

function viewSchedule() {
  return `<div class="main-header"><h2>🔄 All Schedules</h2><div class="subtitle">Recurring schedule reference</div></div>
  <div class="section"><div class="section-header"><h3>☀️ Daily</h3><span class="count">${TASKS.daily.length}</span></div>
    ${TASKS.daily.map(t=>`<div class="task-item"><div style="font-size:18px">${t.icon}</div><div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta"><span class="task-tag tag-time">🕐 ${t.time}</span><span class="task-tag tag-recurring">🔄 ${t.recurrence}</span>${t.reminder?`<span class="task-tag tag-reminder">🔔 ${t.reminder}m before</span>`:''}</div></div></div>`).join('')}
  </div>
  <div class="section"><div class="section-header"><h3>📆 Weekly / Regular</h3><span class="count">${TASKS.weekly.length}</span></div>
    ${TASKS.weekly.map(t=>`<div class="task-item"><div style="font-size:18px">${t.icon}</div><div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta"><span class="task-tag tag-recurring">🔄 ${t.recurrence}</span><span class="task-tag tag-time">📅 Next: ${formatDate(t.nextDue)}</span>${t.cost?`<span class="task-tag tag-cost">💰 ${t.cost}</span>`:''}</div>${t.description?`<div class="task-description">${t.description}</div>`:''}</div></div>`).join('')}
  </div>`;
}

function viewSettings() {
  const notifOn = state.notificationsEnabled && Notification.permission==='granted';
  const notifSupported = 'Notification' in window;
  const home = getHomeLocation();

  return `<div class="main-header"><h2>⚙️ Settings</h2><div class="subtitle">Home, notifications & app preferences</div></div>

  <div class="settings-section"><h3>🏠 Home Address</h3>
    <div class="address-current">
      <div class="label" style="font-size:14px;font-weight:600">${home.address}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${home.lat.toFixed(5)}°N, ${Math.abs(home.lon).toFixed(5)}°W</div>
    </div>
    <div style="padding:0 0 6px">
      <input id="address-input" class="address-input" type="text" placeholder="Enter new address (e.g. 123 Main St, City, FL)"
        onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)updateHomeAddress(v);}">
      <button class="btn-primary" onclick="const v=document.getElementById('address-input').value.trim();if(v)updateHomeAddress(v);else showToast('Enter an address first')">Update Home Address</button>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Updating your address clears cached routes and generates new ones based on the new location. Geocoding via OpenStreetMap Nominatim.</div>
    </div>
  </div>

  <div class="settings-section"><h3>🔔 Notifications</h3>
    <div class="setting-row">
      <div><div class="label">Task reminders</div><div class="desc">Get notified 30 min before and at task time</div></div>
      ${notifSupported?`<div class="toggle ${notifOn?'on':''}" onclick="requestNotifPermission()"></div>`:'<span style="font-size:12px;color:var(--text-muted)">Not supported</span>'}
    </div>
    <div class="setting-row">
      <div><div class="label">Status</div><div class="desc">${notifOn?'Notifications are active — you\'ll get reminders':'Tap the toggle above to enable'}</div></div>
      <span style="font-size:18px">${notifOn?'✅':'❌'}</span>
    </div>
  </div>

  <div class="settings-section"><h3>🗺️ Route Engine</h3>
    <div class="setting-row" style="flex-direction:column;align-items:stretch">
      <div class="label">How routes are generated</div>
      <div class="desc" style="margin-top:4px">Routes use <strong>OSRM foot routing</strong> powered by OpenStreetMap data. Every route follows real sidewalks, pedestrian paths, and walkable residential streets. No abstract geometry — only real-world walkable paths.</div>
      <div style="margin-top:8px">
        <div class="walkability-badge">✅ Sidewalks prioritized</div>
        <div class="walkability-badge">✅ Pedestrian paths included</div>
        <div class="walkability-badge">✅ Highways avoided</div>
        <div class="walkability-badge">✅ 7-day anti-repetition</div>
      </div>
    </div>
  </div>

  <div class="settings-section"><h3>📱 Install as App</h3>
    <div class="setting-row">
      <div><div class="label">Add to Home Screen</div><div class="desc">On iOS: tap Share → Add to Home Screen<br>On Android: tap Menu → Install app</div></div>
      <span style="font-size:18px">📲</span>
    </div>
  </div>

  <div class="settings-section"><h3>🐕 About</h3>
    <div class="setting-row"><div><div class="label">Whiteclaw Care Tracker</div><div class="desc">Built with love. Routes via OSM/OSRM. Task data from Todoist.</div></div></div>
  </div>`;
}

function dailyItem(t, cm) {
  const done=isDailyDone(t.id), past=t.timeMinutes<=cm;
  const isNext=!done&&TASKS.daily.find(x=>!isDailyDone(x.id)&&x.timeMinutes>cm)?.id===t.id;
  return `<div class="task-item ${done?'completed':''} ${!done&&past?'overdue':''}" onclick="toggleDaily('${t.id}')">
    <div class="checkbox p${t.priority} ${done?'checked':''}"></div>
    <div style="font-size:16px">${t.icon}</div>
    <div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">
      <span class="task-tag tag-time">🕐 ${t.time}</span>
      ${!done&&past?'<span class="task-tag tag-overdue">⚠️ Past due</span>':''}
      ${isNext?'<span class="task-tag" style="background:rgba(39,174,96,0.15);color:var(--green-light)">▶ Up next</span>':''}
    </div></div>
    <div class="task-right"><span class="next-due ${!done&&past?'overdue':''}">${t.time}</span></div>
  </div>`;
}

function weeklyItem(t) {
  const done=isWeeklyDone(t.id), od=isOverdue(t.nextDue)&&!done, dt=isDueToday(t.nextDue);
  return `<div class="task-item ${done?'completed':''} ${od?'overdue':''}" onclick="toggleWeekly('${t.id}')">
    <div class="checkbox p${t.priority} ${done?'checked':''}"></div>
    <div style="font-size:16px">${t.icon}</div>
    <div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">
      <span class="task-tag tag-recurring">🔄 ${t.recurrence}</span>
      ${t.cost?`<span class="task-tag tag-cost">💰 ${t.cost}</span>`:''}
      ${od?'<span class="task-tag tag-overdue">⚠️ Overdue</span>':''}
    </div>${t.description?`<div class="task-description">${t.description}</div>`:''}</div>
    <div class="task-right"><span class="next-due ${dt?'today':''} ${od?'overdue':''}">${formatDate(t.nextDue)}</span></div>
  </div>`;
}

// ===== INIT =====
render();
setInterval(render, 60000);
loadGreenSpaces(); // pre-cache nearby parks/green spaces
</script>
</body>
</html>
