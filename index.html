<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e67e22">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon192.png">
<title>Whiteclaw - Care Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #1a1a2e; --sidebar: #16213e; --card: #1e2a45; --card-hover: #253252;
    --accent: #e67e22; --accent-light: #f39c12; --green: #27ae60; --green-light: #2ecc71;
    --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
    --text: #ecf0f1; --text-dim: #95a5a6; --text-muted: #7f8c8d; --border: #2c3e50;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(64px + var(--safe-bottom));
  }

  /* ===== MOBILE BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--sidebar); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 calc(6px + var(--safe-bottom));
    z-index: 100;
  }
  .bottom-nav .tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 12px; border-radius: 10px; cursor: pointer;
    color: var(--text-muted); font-size: 10px; font-weight: 600;
    transition: all 0.15s; min-width: 48px;
  }
  .bottom-nav .tab .tab-icon { font-size: 20px; }
  .bottom-nav .tab.active { color: var(--accent-light); background: rgba(230,126,34,0.1); }

  /* ===== DESKTOP SIDEBAR ===== */
  .sidebar {
    width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
    padding: 24px 16px; display: none; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
  }
  @media (min-width: 769px) {
    .sidebar { display: flex; }
    .bottom-nav { display: none; }
    .main { margin-left: 260px; }
  }

  .sidebar-header { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .dog-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .sidebar-header h1 { font-size: 18px; font-weight: 800; }
  .sidebar-header p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    font-size: 14px; font-weight: 500; color: var(--text-dim);
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: var(--accent); color: white; }
  .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
  .nav-item .badge { margin-left: auto; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }

  .sidebar-stats { margin-top: auto; padding: 14px; background: var(--card); border-radius: 12px; }
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .stat-row .label { color: var(--text-dim); }
  .stat-row .value { font-weight: 700; color: var(--accent-light); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 3px; transition: width 0.5s; }

  /* ===== MAIN ===== */
  .main { padding: 20px 16px 24px; max-width: 700px; margin: 0 auto; }
  @media (min-width: 769px) { .main { padding: 32px 40px; margin: 0; margin-left: 260px; } }

  .main-header { margin-bottom: 24px; }
  .main-header h2 { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .main-header .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

  .streak { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, rgba(230,126,34,0.2), rgba(231,76,60,0.2)); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--accent-light); margin-top: 8px; }

  /* ===== NOTIFICATION BANNER ===== */
  .notif-banner {
    background: linear-gradient(135deg, var(--accent), #d35400);
    padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .notif-banner .icon { font-size: 24px; }
  .notif-banner .text { flex: 1; font-size: 13px; font-weight: 500; }
  .notif-banner .text strong { display: block; font-size: 14px; margin-bottom: 2px; }
  .notif-banner .btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }

  /* ===== SECTIONS ===== */
  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .section-header h3 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .section-header .count { font-size: 11px; color: var(--text-muted); background: var(--card); padding: 2px 8px; border-radius: 10px; font-weight: 600; }

  /* ===== TASK ITEM ===== */
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--card); border-radius: 10px;
    margin-bottom: 6px; transition: all 0.15s; cursor: pointer;
    border: 1px solid transparent; -webkit-user-select: none; user-select: none;
  }
  .task-item:active { transform: scale(0.98); background: var(--card-hover); }
  .task-item.completed { opacity: 0.45; }
  .task-item.completed .task-name { text-decoration: line-through; color: var(--text-muted); }
  .task-item.overdue { border-left: 3px solid var(--red); }

  .checkbox {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--text-muted); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s; margin-top: 1px;
  }
  .checkbox.p1 { border-color: var(--red); }
  .checkbox.p2 { border-color: var(--accent); }
  .checkbox.p3 { border-color: var(--blue); }
  .checkbox.checked { background: var(--green); border-color: var(--green); }
  .checkbox.checked::after { content: '\2713'; color: white; font-size: 13px; font-weight: 700; }

  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .task-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .tag-time { background: rgba(230,126,34,0.15); color: var(--accent-light); }
  .tag-recurring { background: rgba(155,89,182,0.15); color: #bb8fce; }
  .tag-reminder { background: rgba(52,152,219,0.15); color: var(--blue); }
  .tag-cost { background: rgba(39,174,96,0.15); color: var(--green-light); }
  .tag-overdue { background: rgba(231,76,60,0.2); color: var(--red); }
  .task-description { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .task-right { flex-shrink: 0; }
  .next-due { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .next-due.today { color: var(--accent); font-weight: 600; }
  .next-due.overdue { color: var(--red); font-weight: 600; }

  /* ===== TIMELINE ===== */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline .task-item { position: relative; }
  .timeline .task-item::before { content: ''; position: absolute; left: -20px; top: 18px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
  .timeline .task-item.completed::before { background: var(--green); }

  .current-time-bar { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 12px; color: var(--red); font-weight: 600; }
  .current-time-bar::after { content: ''; flex: 1; height: 1px; background: var(--red); opacity: 0.5; }
  .current-time-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.3); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #333; color: white; padding: 12px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== SETTINGS PANEL ===== */
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: var(--card); border-radius: 10px; margin-bottom: 6px;
  }
  .setting-row .label { font-size: 14px; font-weight: 500; }
  .setting-row .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .toggle {
    width: 44px; height: 24px; border-radius: 12px; background: var(--border);
    position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: white;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(20px); }
  .btn-primary {
    background: var(--accent); border: none; color: white;
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px;
  }

  /* ===== ROUTE VIEW ===== */
  .route-card {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 12px; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .route-card:active { transform: scale(0.98); background: var(--card-hover); }
  .route-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .route-slot { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .route-type-badge {
    display: inline-flex; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-structured { background: rgba(52,152,219,0.15); color: var(--blue); }
  .badge-exploration { background: rgba(155,89,182,0.15); color: var(--purple); }
  .badge-efficient { background: rgba(39,174,96,0.15); color: var(--green-light); }
  .route-stats { display: flex; gap: 16px; margin-bottom: 12px; }
  .route-stat { font-size: 13px; color: var(--text-dim); }
  .route-stat strong { color: var(--text); font-weight: 600; }
  .route-preview { background: var(--bg); border-radius: 8px; padding: 8px; margin-bottom: 10px; display: flex; justify-content: center; }
  .route-directions { list-style: none; }
  .route-step {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid rgba(44,62,80,0.5); font-size: 13px;
  }
  .route-step:last-child { border-bottom: none; }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .step-text { flex: 1; line-height: 1.4; }
  .step-dist { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .route-actions { display: flex; gap: 8px; margin-top: 16px; }
  .route-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
  }
  .route-btn-primary { background: var(--accent); color: white; }
  .route-btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .route-back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 16px; background: none; border: none; }
  .env-modifiers { margin-top: 20px; padding: 14px; background: var(--card); border-radius: 10px; }
  .env-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; background: rgba(230,126,34,0.1); color: var(--accent-light); margin: 3px 4px 3px 0; }
</style>
</head>
<body>

<div id="app"></div>

<!-- BOTTOM NAV (mobile) -->
<div class="bottom-nav" id="bottomNav"></div>

<script>
// ===== TASK DATA (from Todoist) =====
const TASKS = {
  daily: [
    { id:'d1', name:'Long morning walk', time:'9:00 AM', timeMinutes:540, recurrence:'Every day at 9:00 AM', priority:4, reminder:30, icon:'🚶' },
    { id:'d2', name:'Breakfast', time:'9:00 AM', timeMinutes:540, recurrence:'Every day at 9:00 AM', priority:4, reminder:null, icon:'🍖' },
    { id:'d3', name:'Afternoon potty/quick walk', time:'1:00 PM', timeMinutes:780, recurrence:'Every day at 1:00 PM', priority:4, reminder:30, icon:'🐾' },
    { id:'d4', name:'Long, pre-dinner walk', time:'5:30 PM', timeMinutes:1050, recurrence:'Every day at 5:30 PM', priority:4, reminder:30, icon:'🌅' },
    { id:'d5', name:'Dinner', time:'6:00 PM', timeMinutes:1080, recurrence:'Every day at 6:00 PM', priority:4, reminder:30, icon:'🥩' },
    { id:'d6', name:'Bedtime potty/short walk', time:'9:00 PM', timeMinutes:1260, recurrence:'Every day at 9:00 PM', priority:4, reminder:30, icon:'🌙' }
  ],
  weekly: [
    { id:'w1', name:'Nail Trim - $25', recurrence:'Every 2 weeks', nextDue:'2026-05-13', priority:4, icon:'✂️', description:'Zen Dog Grooming', cost:'$25' },
    { id:'w2', name:'Weekly brush', recurrence:'Every week', nextDue:'2026-05-04', priority:1, icon:'🪮', description:'' },
    { id:'w3', name:'Bathtime', recurrence:'Every Sunday', nextDue:'2026-05-10', priority:1, icon:'🛁', description:'' },
    { id:'w4', name:'Nextguard+ medication', recurrence:'Every month', nextDue:'2026-05-19', priority:3, icon:'💊', description:'Flea & tick prevention' },
    { id:'w5', name:'Order Water Fountain Filters - $23', recurrence:'Every month', nextDue:'2026-05-04', priority:4, icon:'⛲', description:'SIBAYS 4Gal/15L replacement filters', cost:'$23' }
  ]
};

// ===== STATE =====
let state = {
  view: 'today',
  completedToday: {},
  completedWeekly: {},
  notificationsEnabled: false,
  notifiedTasks: {},
  routeDetail: null
};

function loadState() {
  try {
    state.completedToday = JSON.parse(localStorage.getItem('wc_completed') || '{}');
    state.completedWeekly = JSON.parse(localStorage.getItem('wc_weekly_completed') || '{}');
    state.notificationsEnabled = localStorage.getItem('wc_notif') === 'true';
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('wc_completed', JSON.stringify(state.completedToday));
    localStorage.setItem('wc_weekly_completed', JSON.stringify(state.completedWeekly));
    localStorage.setItem('wc_notif', state.notificationsEnabled ? 'true' : 'false');
  } catch(e) {}
}
loadState();

// ===== HELPERS =====
const getNow = () => new Date();
const getCurrentMinutes = () => { const n=getNow(); return n.getHours()*60+n.getMinutes(); };
const getTodayKey = () => { const d=getNow(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

function formatDate(ds) {
  const d=new Date(ds+'T12:00:00'), today=getNow(); today.setHours(12,0,0,0);
  const diff=Math.floor((d-today)/(864e5));
  if(diff===0) return 'Today'; if(diff===1) return 'Tomorrow';
  if(diff<0) return `${Math.abs(diff)}d overdue`;
  if(diff<7) return d.toLocaleDateString('en-US',{weekday:'long'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
const isOverdue = ds => new Date(ds+'T23:59:59') < getNow();
const isDueToday = ds => ds === getTodayKey();
const getDailyCompleted = () => state.completedToday[getTodayKey()] || [];
const isDailyDone = id => getDailyCompleted().includes(id);
const isWeeklyDone = id => (state.completedWeekly[getTodayKey()] || []).includes(id);

function toggleDaily(id) {
  const k=getTodayKey(); if(!state.completedToday[k]) state.completedToday[k]=[];
  const a=state.completedToday[k], i=a.indexOf(id);
  if(i>=0) a.splice(i,1); else { a.push(id); showToast('Done! Whiteclaw says thanks 🐕'); }
  saveState(); render();
}
function toggleWeekly(id) {
  const k=getTodayKey(); if(!state.completedWeekly[k]) state.completedWeekly[k]=[];
  const a=state.completedWeekly[k], i=a.indexOf(id);
  if(i>=0) a.splice(i,1); else { a.push(id); showToast('Done! Good dog parent 🐾'); }
  saveState(); render();
}

function getStats() {
  const dd=getDailyCompleted().length, td=TASKS.daily.length;
  const wdue=TASKS.weekly.filter(t=>isDueToday(t.nextDue)||isOverdue(t.nextDue)).length;
  const wdone=TASKS.weekly.filter(t=>(isDueToday(t.nextDue)||isOverdue(t.nextDue))&&isWeeklyDone(t.id)).length;
  const total=td+wdue, done=dd+wdone;
  return { dd, td, wdue, wdone, done, total, pct: total>0?Math.round(done/total*100):0 };
}

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); },2500);
}
function setView(v) { state.view=v; state.routeDetail=null; render(); }

// ===== NOTIFICATIONS =====
async function requestNotifPermission() {
  if(!('Notification' in window)) { showToast('Notifications not supported on this browser'); return; }
  const perm = await Notification.requestPermission();
  state.notificationsEnabled = perm === 'granted';
  saveState();
  if(perm==='granted') showToast('Notifications enabled! 🔔');
  else showToast('Notifications blocked — check browser settings');
  render();
}

function checkAndNotify() {
  if(!state.notificationsEnabled || Notification.permission !== 'granted') return;
  const now = getCurrentMinutes();
  const todayKey = getTodayKey();

  TASKS.daily.forEach(task => {
    if(isDailyDone(task.id)) return;
    const notifKey = `${todayKey}-${task.id}`;

    // Notify at task time
    if(Math.abs(now - task.timeMinutes) <= 1 && !state.notifiedTasks[notifKey]) {
      state.notifiedTasks[notifKey] = true;
      new Notification(`🐕 Whiteclaw — ${task.name}`, {
        body: `It's ${task.time}! Time for ${task.name.toLowerCase()}.`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23e67e22"/><text x="50" y="68" font-size="55" text-anchor="middle">🐕</text></svg>',
        tag: notifKey,
        requireInteraction: true
      });
    }

    // Notify 30 min before (reminder)
    if(task.reminder) {
      const reminderKey = `${todayKey}-${task.id}-reminder`;
      const reminderTime = task.timeMinutes - task.reminder;
      if(Math.abs(now - reminderTime) <= 1 && !state.notifiedTasks[reminderKey]) {
        state.notifiedTasks[reminderKey] = true;
        new Notification(`🔔 Whiteclaw reminder`, {
          body: `${task.name} in ${task.reminder} minutes (${task.time})`,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23e67e22"/><text x="50" y="68" font-size="55" text-anchor="middle">🐕</text></svg>',
          tag: reminderKey
        });
      }
    }
  });
}

// Check notifications every 30 seconds
setInterval(checkAndNotify, 30000);
checkAndNotify();

// ===== ROUTE GENERATION SYSTEM =====
// Home: 1715 Hodges Blvd, Apt 509, Jacksonville FL 32224
const HOME_LAT = 30.2443, HOME_LON = -81.5162;

// Street network — 27 nodes (intersections), 41 edges (street segments)
// Coordinates: x = east, y = north, in miles from home
const RN = {};
[['H','Home — 1715 Hodges Blvd',0,0],
 ['N1','Hodges & Cobblefield N',0,.13],['N2','Hodges & Marsh Creek Dr',0,.27],['N3','Hodges & Gate Pkwy',0,.42],
 ['S1','Hodges & Cobblefield S',0,-.13],['S2','Hodges & Sandy Creek Dr',0,-.27],['S3','Hodges & Baymeadows Way',0,-.42],
 ['E1','Cobblefield & Royal Fern',.17,.13],['E2','Royal Fern & Osprey Pointe',.34,.13],
 ['E3','Cobblefield & Deer Lake',.17,-.13],['E4','Deer Lake & Osprey Pointe',.34,-.13],

// Edges: [from, to, street_name, distance_miles]

[['H','N1','Hodges Blvd',.13],['N1','N2','Hodges Blvd',.14],['N2','N3','Hodges Blvd',.15],

].forEach((e,i) => RE.push({ i, from:e[0], to:e[1], street:e[2], dist:e[3] }));

// Adjacency list (bidirectional)
const RADJ = {};
Object.keys(RN).forEach(id => RADJ[id] = []);
RE.forEach(e => {
  RADJ[e.from].push({ to:e.to, idx:e.i, dist:e.dist, street:e.street });
  RADJ[e.to].push({ to:e.from, idx:e.i, dist:e.dist, street:e.street });
});

// Seeded PRNG (mulberry32)
function rngCreate(seed) {
  let s = seed >>> 0;
  return () => { s|=0; s=s+0x6D2B79F5|0; let t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; };
}
function rngHash(str) { let h=0; for(let i=0;i<str.length;i++) h=Math.imul(31,h)+str.charCodeAt(i)|0; return h>>>0; }

// Crow-fly distance between nodes
function crowFly(a,b) { return Math.sqrt((RN[a].x-RN[b].x)**2+(RN[a].y-RN[b].y)**2); }

// Dijkstra shortest path with randomized weights + edge avoidance
function routeFindPath(from, to, avoid, rng, noise) {
  const dist={}, prev={}, prevE={}, vis=new Set();
  Object.keys(RN).forEach(n => dist[n]=Infinity);
  dist[from]=0;
  const pq=[[0,from]];
  while(pq.length) {
    pq.sort((a,b)=>a[0]-b[0]);
    const [d,u]=pq.shift();
    if(vis.has(u)) continue; vis.add(u);
    if(u===to) break;
    for(const nb of RADJ[u]) {
      if(avoid.has(nb.idx)||vis.has(nb.to)) continue;
      const w = nb.dist + (rng ? rng()*noise*nb.dist : 0);
      const nd = dist[u]+w;
      if(nd<dist[nb.to]) { dist[nb.to]=nd; prev[nb.to]=u; prevE[nb.to]=nb.idx; pq.push([nd,nb.to]); }
    }
  }
  if(dist[to]===Infinity) return null;
  const nodes=[], edges=[]; let c=to;
  while(c!==from) { nodes.unshift(c); edges.unshift(prevE[c]); c=prev[c]; }
  nodes.unshift(from);
  let td=0; edges.forEach(idx => td+=RE[idx].dist);
  return { nodes, edges, distance:td };
}

// Compass bearing from node A to node B
function routeBearing(a,b) {
  const dx=RN[b].x-RN[a].x, dy=RN[b].y-RN[a].y;
  const ang=Math.atan2(dx,dy)*180/Math.PI;
  if(ang>=-22.5&&ang<22.5) return 'north'; if(ang>=22.5&&ang<67.5) return 'northeast';
  if(ang>=67.5&&ang<112.5) return 'east'; if(ang>=112.5&&ang<157.5) return 'southeast';
  if(ang>=157.5||ang<-157.5) return 'south'; if(ang>=-157.5&&ang<-112.5) return 'southwest';
  if(ang>=-112.5&&ang<-67.5) return 'west'; return 'northwest';
}

// Cross-product turn direction
function routeTurnDir(prevId, atId, nextId) {
  const v1x=RN[atId].x-RN[prevId].x, v1y=RN[atId].y-RN[prevId].y;
  const v2x=RN[nextId].x-RN[atId].x, v2y=RN[nextId].y-RN[atId].y;
  const cross=v1x*v2y-v1y*v2x;
  if(Math.abs(cross)<0.005) return 'Continue straight on';
  return cross>0?'Turn left onto':'Turn right onto';
}

// Build human-readable turn-by-turn directions
function buildRouteDirections(nodeList, edgeIdxs) {
  const dirs=[]; let prevStreet=null, accumDist=0;
  for(let i=0;i<edgeIdxs.length;i++) {
    const e=RE[edgeIdxs[i]];
    if(e.street===prevStreet) {
      accumDist+=e.dist;
      dirs[dirs.length-1].distance=Math.round(accumDist*100)/100;
    } else {
      accumDist=e.dist;
      if(!prevStreet) {
        dirs.push({ instruction:`Head ${routeBearing(nodeList[0],nodeList[1])} on ${e.street}`, street:e.street, distance:e.dist });
      } else {
        const turn=routeTurnDir(nodeList[i-1],nodeList[i],nodeList[i+1]);
        dirs.push({ instruction:`${turn} ${e.street}`, street:e.street, distance:e.dist });
      }
      prevStreet=e.street;
    }
  }
  dirs.push({ instruction:'Arrive back at 1715 Hodges Blvd', street:'', distance:0 });
  return dirs;
}

// Route hashing for anti-repetition
function routeHashEdges(edgeIdxs) { return [...edgeIdxs].sort((a,b)=>a-b).join(','); }
function routeOverlap(h1,h2) {
  const s1=new Set(h1.split(',')), s2=new Set(h2.split(','));
  let shared=0; s1.forEach(x=>{ if(s2.has(x)) shared++; });
  return shared/Math.max(s1.size,s2.size);
}

// Route type parameters — controls path character
const ROUTE_PARAMS = {
  structured: { noise:0.08, desc:'Fewer turns, more direct', icon:'📐' },
  exploration: { noise:0.45, desc:'More turns, zig-zag, higher novelty', icon:'🧭' },
  efficient: { noise:0.03, desc:'Cleanest loop, minimal overlap', icon:'⚡' }
};

// Environmental modifier stubs (extensible)
const ENV_MODIFIERS = {
  heat: { distMult:0.85, prefer:['shaded'], desc:'Shorter, prefer shade' },
  energy_low: { distMult:0.75, prefer:['flat'], desc:'Easy, shorter route' },
  energy_high: { distMult:1.2, prefer:['varied'], desc:'Longer, more complex' }
};

// Core loop finder: waypoint-based outbound + return on different streets
function findRouteLoop(rng, noise) {
  const allNodes=Object.keys(RN).filter(n=>n!=='H');
  const candidates=allNodes.filter(n=>{ const d=crowFly('H',n); return d>=0.25&&d<=0.70; });
  if(!candidates.length) return null;

  // Shuffle candidates
  for(let i=candidates.length-1;i>0;i--) { const j=Math.floor(rng()*i); [candidates[i],candidates[j]]=[candidates[j],candidates[i]]; }

  for(const wp of candidates) {
    const outbound=routeFindPath('H',wp,new Set(),rng,noise);
    if(!outbound) continue;

    // Return path avoiding outbound edges
    const avoidFull=new Set(outbound.edges);
    let inbound=routeFindPath(wp,'H',avoidFull,rng,noise);

    // Fallback: avoid only interior edges (allow sharing first/last)
    if(!inbound) {
      const avoidPartial=new Set(outbound.edges.slice(1,-1));
      inbound=routeFindPath(wp,'H',avoidPartial,rng,noise);
    }
    if(!inbound) continue;

    const totalDist=outbound.distance+inbound.distance;
    if(totalDist>=1.35&&totalDist<=1.65) {
      return {
        nodes:[...outbound.nodes,...inbound.nodes.slice(1)],
        edges:[...outbound.edges,...inbound.edges],
        distance:totalDist, waypoint:wp
      };
    }
  }
  return null;
}

// Generate a single route for a given slot
function generateSingleRoute(seed, slot, routeType, recentHashes) {
  const rng=rngCreate(seed);
  const params=ROUTE_PARAMS[routeType];

  for(let attempt=0;attempt<25;attempt++) {
    const loop=findRouteLoop(rng, params.noise+attempt*0.015);
    if(!loop) continue;

    const hash=routeHashEdges(loop.edges);
    const dominated=recentHashes.some(h=>routeOverlap(hash,h)>0.6);
    if(dominated&&attempt<22) continue;

    const directions=buildRouteDirections(loop.nodes,loop.edges);
    const dist=Math.round(loop.distance*100)/100;
    return {
      id:`route-${slot}-${seed}`, slot, type:routeType,
      distance:dist, duration:Math.round(dist*20),
      directions, nodes:loop.nodes, edges:loop.edges, hash,
      coordinates:loop.nodes.map(n=>[HOME_LAT+RN[n].y/69.05, HOME_LON-RN[n].x/59.76])
    };
  }

  // Last resort: max noise
  const rng2=rngCreate(seed+999);
  const loop=findRouteLoop(rng2, 0.9);
  if(loop) {
    const directions=buildRouteDirections(loop.nodes,loop.edges);
    const dist=Math.round(loop.distance*100)/100;
    return { id:`route-${slot}-${seed}`, slot, type:routeType, distance:dist, duration:Math.round(dist*20), directions, nodes:loop.nodes, edges:loop.edges, hash:routeHashEdges(loop.edges), coordinates:loop.nodes.map(n=>[HOME_LAT+RN[n].y/69.05,HOME_LON-RN[n].x/59.76]) };
  }
  return null;
}

// Generate AM + PM routes for a date
function generateDailyRoutes(dateKey) {
  const recent=getRecentRouteHashes(7);
  const amSeed=rngHash(dateKey+'-am-whiteclaw');
  const pmSeed=rngHash(dateKey+'-pm-whiteclaw');
  const amRng=rngCreate(amSeed), pmRng=rngCreate(pmSeed);

  const types=Object.keys(ROUTE_PARAMS);
  const amType=types[Math.floor(amRng()*types.length)];
  const remaining=types.filter(t=>t!==amType);
  const pmType=remaining[Math.floor(pmRng()*remaining.length)];

  const am=generateSingleRoute(amSeed,'am',amType,recent);
  const pm=generateSingleRoute(pmSeed,'pm',pmType,[...recent,am?am.hash:'']);

  const result={ date:dateKey, am, pm };
  saveRouteHistory(dateKey,result);
  return result;
}

// Route history persistence
function loadRouteHistory() { try { return JSON.parse(localStorage.getItem('wc_routes')||'{}'); } catch(e) { return {}; } }
function saveRouteHistory(dateKey, routes) {
  const h=loadRouteHistory(); h[dateKey]=routes;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-14);
  Object.keys(h).forEach(k=>{ if(new Date(k+'T12:00:00')<cutoff) delete h[k]; });
  try { localStorage.setItem('wc_routes',JSON.stringify(h)); } catch(e){}
}
function getRecentRouteHashes(days) {
  const h=loadRouteHistory(), hashes=[];
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
  Object.entries(h).forEach(([k,v])=>{
    if(new Date(k+'T12:00:00')>=cutoff) {
      if(v.am?.hash) hashes.push(v.am.hash);
      if(v.pm?.hash) hashes.push(v.pm.hash);
    }
  });
  return hashes;
}

function getTodayRoutes() {
  const key=getTodayKey();
  const cached=loadRouteHistory()[key];
  if(cached?.am&&cached?.pm) return cached;
  return generateDailyRoutes(key);
}

function regenerateRoutes() {
  const key=getTodayKey();
  const h=loadRouteHistory(); delete h[key];
  try { localStorage.setItem('wc_routes',JSON.stringify(h)); } catch(e){}
  state.routeDetail=null;
  showToast('New routes generated! 🗺️');
  render();
}

// Multi-day simulation (call from console: simulateRoutes(14))
function simulateRoutes(days) {
  const d=new Date(), results=[];
  for(let i=0;i<days;i++) {
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const r=generateDailyRoutes(k);
    results.push({ date:k, am_type:r.am?.type||'FAIL', am_dist:r.am?.distance||0, am_turns:r.am?.directions?.length-1||0, pm_type:r.pm?.type||'FAIL', pm_dist:r.pm?.distance||0, pm_turns:r.pm?.directions?.length-1||0 });
    d.setDate(d.getDate()+1);
  }
  console.table(results);
  return results;
}

// SVG mini-map renderer
function renderRouteSVG(route) {
  if(!route?.nodes) return '';
  const pts=route.nodes.map(n=>({ x:RN[n].x, y:RN[n].y }));
  const pad=0.06;
  const minX=Math.min(...pts.map(p=>p.x))-pad, maxX=Math.max(...pts.map(p=>p.x))+pad;
  const minY=Math.min(...pts.map(p=>p.y))-pad, maxY=Math.max(...pts.map(p=>p.y))+pad;
  const w=220, h=160;
  const sx=n=>((RN[n].x-minX)/(maxX-minX))*w;
  const sy=n=>h-((RN[n].y-minY)/(maxY-minY))*h;

  // Background: all network edges (faint grid)
  let bg='';
  RE.forEach(e=>{ bg+=`<line x1="${sx(e.from)}" y1="${sy(e.from)}" x2="${sx(e.to)}" y2="${sy(e.to)}" stroke="rgba(236,240,241,0.07)" stroke-width="1"/>`; });

  // Route path
  let pathD=`M${sx(route.nodes[0])},${sy(route.nodes[0])}`;
  for(let i=1;i<route.nodes.length;i++) pathD+=` L${sx(route.nodes[i])},${sy(route.nodes[i])}`;

  // Waypoint marker (farthest point)
  let farthest=route.nodes[0], maxD=0;
  route.nodes.forEach(n=>{ const d=crowFly('H',n); if(d>maxD){maxD=d;farthest=n;} });

  const hx=sx('H'), hy=sy('H');
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:280px;height:auto;">
    ${bg}
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="${sx(farthest)}" cy="${sy(farthest)}" r="3" fill="var(--purple)" opacity="0.7"/>
    <circle cx="${hx}" cy="${hy}" r="6" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>
    <text x="${hx}" y="${hy-10}" text-anchor="middle" fill="var(--text)" font-size="10">🏠</text>
  </svg>`;
}

    </div>`;

  const mainHTML = renderView(s, dateStr, timeStr, cm);
  document.getElementById('app').innerHTML = sidebarHTML + `<div class="main">${mainHTML}</div>`;
}

function renderView(s, dateStr, timeStr, cm) {
  switch(state.view) {
    case 'today': return viewToday(s,dateStr,timeStr,cm);
    case 'daily': return viewDaily(cm);
    case 'weekly': return viewWeekly();
    case 'timeline': return viewTimeline(cm);
    case 'routes': return viewRoutes();
    case 'schedule': return viewSchedule();
    case 'settings': return viewSettings();
    default: return viewToday(s,dateStr,timeStr,cm);
  }
}

function notifBanner() {
  if(state.notificationsEnabled && Notification.permission==='granted') return '';
  if(!('Notification' in window)) return '';
  return `<div class="notif-banner" onclick="requestNotifPermission()">
    <span class="icon">🔔</span>
    <div class="text"><strong>Enable Reminders</strong>Get notified when it's time for Whiteclaw's tasks</div>
    <button class="btn">Enable</button>
  </div>`;
}

function viewToday(s, dateStr, timeStr, cm) {
  const overdue=TASKS.weekly.filter(t=>isOverdue(t.nextDue)&&!isWeeklyDone(t.id));
  const dueW=TASKS.weekly.filter(t=>isDueToday(t.nextDue));
  const past=TASKS.daily.filter(t=>t.timeMinutes<=cm), upcoming=TASKS.daily.filter(t=>t.timeMinutes>cm);

  return `<div class="main-header">
    <h2>☀️ Today</h2><div class="subtitle">${dateStr} &bull; ${timeStr}</div>
    <div class="streak">🐾 ${s.total-s.done?s.total-s.done+' tasks left':'All done! 🔥'}</div>
  </div>
  ${notifBanner()}
  ${overdue.length?`<div class="section"><div class="section-header"><h3>⚠️ Overdue</h3><span class="count">${overdue.length}</span></div>${overdue.map(weeklyItem).join('')}</div>`:''}
  <div class="section"><div class="section-header"><h3>🐕 Daily Routine</h3><span class="count">${s.dd}/${s.td}</span></div>
    ${past.map(t=>dailyItem(t,cm)).join('')}
    ${upcoming.length&&past.length?`<div class="current-time-bar"><span class="dot"></span>Now — ${timeStr}</div>`:''}
    ${upcoming.map(t=>dailyItem(t,cm)).join('')}
  </div>
  ${dueW.length?`<div class="section"><div class="section-header"><h3>📆 Also Due Today</h3><span class="count">${dueW.length}</span></div>${dueW.map(weeklyItem).join('')}</div>`:''}`;
}

function viewDaily(cm) {
  return `<div class="main-header"><h2>📋 Daily Routine</h2><div class="subtitle">Every single day</div></div>
  <div class="section">${TASKS.daily.map(t=>dailyItem(t,cm)).join('')}</div>`;
}

function viewWeekly() {
  return `<div class="main-header"><h2>📆 Weekly / Regular</h2><div class="subtitle">Grooming, health & supplies</div></div>
  <div class="section">${TASKS.weekly.map(weeklyItem).join('')}</div>`;
}

function viewTimeline(cm) {
  const timeStr=getNow().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  let html=`<div class="main-header"><h2>⏱️ Timeline</h2><div class="subtitle">Whiteclaw's day at a glance</div></div><div class="timeline">`;
  let ins=false;
  TASKS.daily.forEach(t=>{
    if(!ins&&t.timeMinutes>cm){ html+=`<div class="current-time-bar" style="margin-left:-24px"><span class="dot"></span>Now — ${timeStr}</div>`; ins=true; }
    html+=dailyItem(t,cm);
  });
  if(!ins) html+=`<div class="current-time-bar" style="margin-left:-24px"><span class="dot"></span>Now — ${timeStr}</div>`;
  return html+'</div>';
}

function viewSchedule() {
  return `<div class="main-header"><h2>🔄 All Schedules</h2><div class="subtitle">Recurring schedule reference</div></div>
  <div class="section"><div class="section-header"><h3>☀️ Daily</h3><span class="count">${TASKS.daily.length}</span></div>
    ${TASKS.daily.map(t=>`<div class="task-item"><div style="font-size:18px">${t.icon}</div><div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta"><span class="task-tag tag-time">🕐 ${t.time}</span><span class="task-tag tag-recurring">🔄 ${t.recurrence}</span>${t.reminder?`<span class="task-tag tag-reminder">🔔 ${t.reminder}m before</span>`:''}</div></div></div>`).join('')}
  </div>
  <div class="section"><div class="section-header"><h3>📆 Weekly / Regular</h3><span class="count">${TASKS.weekly.length}</span></div>
    ${TASKS.weekly.map(t=>`<div class="task-item"><div style="font-size:18px">${t.icon}</div><div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta"><span class="task-tag tag-recurring">🔄 ${t.recurrence}</span><span class="task-tag tag-time">📅 Next: ${formatDate(t.nextDue)}</span>${t.cost?`<span class="task-tag tag-cost">💰 ${t.cost}</span>`:''}</div>${t.description?`<div class="task-description">${t.description}</div>`:''}</div></div>`).join('')}
  </div>`;
}

function viewSettings() {
  const notifOn = state.notificationsEnabled && Notification.permission==='granted';
  const notifSupported = 'Notification' in window;
  return `<div class="main-header"><h2>⚙️ Settings</h2><div class="subtitle">Notification & app preferences</div></div>
  <div class="settings-section"><h3>🔔 Notifications</h3>
    <div class="setting-row">
      <div><div class="label">Task reminders</div><div class="desc">Get notified 30 min before and at task time</div></div>
      ${notifSupported?`<div class="toggle ${notifOn?'on':''}" onclick="requestNotifPermission()"></div>`:'<span style="font-size:12px;color:var(--text-muted)">Not supported</span>'}
    </div>
    <div class="setting-row">
      <div><div class="label">Status</div><div class="desc">${notifOn?'Notifications are active — you\'ll get reminders':'Tap the toggle above to enable'}</div></div>
      <span style="font-size:18px">${notifOn?'✅':'❌'}</span>
    </div>
  </div>
  <div class="settings-section"><h3>📱 Install as App</h3>
    <div class="setting-row">
      <div><div class="label">Add to Home Screen</div><div class="desc">On iOS: tap Share → Add to Home Screen<br>On Android: tap Menu → Install app</div></div>
      <span style="font-size:18px">📲</span>
    </div>
  </div>
  <div class="settings-section"><h3>🐕 About</h3>
    <div class="setting-row"><div><div class="label">Whiteclaw Care Tracker</div><div class="desc">Built with love. All task data from Todoist.</div></div></div>
  </div>`;
}

function dailyItem(t, cm) {
  const done=isDailyDone(t.id), past=t.timeMinutes<=cm;
  const isNext=!done&&TASKS.daily.find(x=>!isDailyDone(x.id)&&x.timeMinutes>cm)?.id===t.id;
  return `<div class="task-item ${done?'completed':''} ${!done&&past?'overdue':''}" onclick="toggleDaily('${t.id}')">
    <div class="checkbox p${t.priority} ${done?'checked':''}"></div>
    <div style="font-size:16px">${t.icon}</div>
    <div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">
      <span class="task-tag tag-time">🕐 ${t.time}</span>
      ${!done&&past?'<span class="task-tag tag-overdue">⚠️ Past due</span>':''}
      ${isNext?'<span class="task-tag" style="background:rgba(39,174,96,0.15);color:var(--green-light)">▶ Up next</span>':''}
    </div></div>
    <div class="task-right"><span class="next-due ${!done&&past?'overdue':''}">${t.time}</span></div>
  </div>`;
}

function weeklyItem(t) {
  const done=isWeeklyDone(t.id), od=isOverdue(t.nextDue)&&!done, dt=isDueToday(t.nextDue);
  return `<div class="task-item ${done?'completed':''} ${od?'overdue':''}" onclick="toggleWeekly('${t.id}')">
    <div class="checkbox p${t.priority} ${done?'checked':''}"></div>
    <div style="font-size:16px">${t.icon}</div>
    <div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">
      <span class="task-tag tag-recurring">🔄 ${t.recurrence}</span>
      ${t.cost?`<span class="task-tag tag-cost">💰 ${t.cost}</span>`:''}
      ${od?'<span class="task-tag tag-overdue">⚠️ Overdue</span>':''}
    </div>${t.description?`<div class="task-description">${t.description}</div>`:''}</div>
    <div class="task-right"><span class="next-due ${dt?'today':''} ${od?'overdue':''}">${formatDate(t.nextDue)}</span></div>
  </div>`;
}

// ===== INIT =====
render();
setInterval(render, 60000);
</script>
</body>
</html>
